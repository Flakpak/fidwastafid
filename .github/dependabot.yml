# Phase 2 — Dependabot actif (principes non négociables §7).
# "npm" avec directory "/" couvre tout le workspace pnpm (racine + apps/* +
# packages/*), Dependabot lit pnpm-lock.yaml et pnpm-workspace.yaml nativement.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # Incident du 19/07/2026 : le PR Dependabot next-16.2.10 (major) casse le
      # build Vercel — Next 16 active Turbopack par défaut, incompatible avec
      # le webpack() custom de next.config.ts (transpilePackages/extensionAlias)
      # sans migration explicite. La migration Next 16/Turbopack est un
      # chantier à planifier volontairement, pas une mise à jour automatique à
      # subir. Retirer cette règle (ou l'affiner) quand la migration sera prête.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
