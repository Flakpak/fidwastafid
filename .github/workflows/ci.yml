# .github/workflows/ci.yml
#
# Phase 2 — Fondation : rien ne merge si lint/typecheck/test/build cassent.
#
# Quatre jobs indépendants (en parallèle, aucun `needs:` entre eux) :
#   - quality          : pnpm lint + typecheck + test sur tout le workspace.
#                         Ne dépend JAMAIS des secrets Supabase (décision
#                         explicite, Phase 3 morceau 9) — un souci sur le
#                         projet Supabase de dev ne doit jamais bloquer
#                         cette validation.
#   - docker           : build de l'image apps/web (ne pousse nulle part,
#                         sert juste à vérifier que le Dockerfile reste
#                         buildable).
#   - integration      : tests d'intégration (soumission/validation/vote)
#                         contre un Postgres jetable + un vrai JWT du projet
#                         Supabase de dev. Touche aux secrets Supabase de
#                         dev (pas la prod).
#   - migrations-check : lecture seule (CONTRAT-V1 §7) — compare
#                         packages/db/migrations/ à schema_migrations de la
#                         prod (aswbu), dans les deux sens. N'applique
#                         jamais rien ; un écart fait échouer le job.
#                         Rôle Postgres dédié `ci_migrations_check`,
#                         SELECT sur schema_migrations uniquement.

name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build apps/web (validation uniquement, pas de push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: fidwastafid-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fidwastafid
          POSTGRES_PASSWORD: fidwastafid
          POSTGRES_DB: fidwastafid
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fidwastafid"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://fidwastafid:fidwastafid@localhost:5432/fidwastafid
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      # Migration clés API Supabase (18/07/2026, docs/MIGRATION-CLES-SUPABASE.md).
      # Legacy (SUPABASE_ANON_KEY/SUPABASE_SERVICE_ROLE_KEY) volontairement
      # absentes ici depuis le 19/07/2026 : incident CI où SUPABASE_ANON_KEY
      # (secret créé le 12/07, jamais renouvelé) s'est retrouvée révoquée
      # côté Supabase sans que rien ne le signale — 18 runs rouges d'affilée
      # avant diagnostic. Un fallback silencieux vers une clé morte n'est pas
      # un filet de sécurité, juste un échec retardé et moins lisible. Ce job
      # tourne confirmé sur les seules nouvelles clés (run 29686685477) — les
      # réintroduire nécessiterait de recréer les secrets legacy à jour.
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      # Clé de test PUBLIQUE Cloudflare ("always passes"), pas un secret.
      TURNSTILE_SECRET_KEY: "1x0000000000000000000000000000000AA"

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @fidwastafid/db migrate
      - run: pnpm --filter @fidwastafid/web test:integration

  migrations-check:
    runs-on: ubuntu-latest

    env:
      CI_MIGRATIONS_CHECK_URL: ${{ secrets.CI_MIGRATIONS_CHECK_URL }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @fidwastafid/db check-migrations-sync
