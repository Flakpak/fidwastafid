services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fidwastafid
      POSTGRES_PASSWORD: fidwastafid
      POSTGRES_DB: fidwastafid
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fidwastafid"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* est figé dans le bundle par `next build` — doit donc
        # être fourni comme build arg, pas comme variable d'environnement du
        # conteneur (qui n'agit qu'au runtime, trop tard).
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
        # Absent du host → docker-compose interpole une chaîne vide (pas
        # "non défini") ; siteUrl.ts s'en protège désormais via `||`.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://fidwastafid:fidwastafid@db:5432/fidwastafid
      NODE_ENV: production
      # Lus depuis un .env à la racine (gitignoré, cf. apps/web/.env.local
      # pour les mêmes valeurs) — packages/auth en a besoin pour vérifier
      # les JWT Supabase, y compris dans ce conteneur de test.
      SUPABASE_URL: ${SUPABASE_URL}
      # Migration clés API Supabase terminée (19/07/2026,
      # docs/MIGRATION-CLES-SUPABASE.md) : legacy (SUPABASE_ANON_KEY/
      # SUPABASE_SERVICE_ROLE_KEY) désactivées côté Dashboard Supabase,
      # retirées d'ici — plus de fallback applicatif à alimenter.
      # Pass-through pur depuis l'environnement hôte, jamais de valeur ici.
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      # Route proxy /img/deals/[publicId] (apps/web/src/app/img/deals) et
      # supabaseAdmin.ts — seuls consommateurs.
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      # Contrepartie du NEXT_PUBLIC_TURNSTILE_SITE_KEY (build arg ci-dessus,
      # côté client) : la clé secrète, elle, est lue au runtime par l'API
      # (verifyTurnstile), donc ici en variable d'environnement du conteneur.
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
