services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fidwastafid
      POSTGRES_PASSWORD: fidwastafid
      POSTGRES_DB: fidwastafid
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fidwastafid"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://fidwastafid:fidwastafid@db:5432/fidwastafid
      NODE_ENV: production
      # Lus depuis un .env à la racine (gitignoré, cf. apps/web/.env.local
      # pour les mêmes valeurs) — packages/auth en a besoin pour vérifier
      # les JWT Supabase, y compris dans ce conteneur de test.
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
