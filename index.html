//  PAGE PROFIL
// ══════════════════════════════════════════
function ProfilPage({ user, userProfile, onGoFeed, onProfileUpdate }) {
  const [form, setForm] = useState({ genre: '', tranche_age: '', ville: '', situation_fam: '', nb_enfants: '' });
  const [saving, setSaving] = useState(false);
  const [saved, setSaved]   = useState(false);

  useEffect(() => {
    if (userProfile) {
      setForm({
        genre:         userProfile.genre         || '',
        tranche_age:   userProfile.tranche_age   || '',
        ville:         userProfile.ville         || '',
        situation_fam: userProfile.situation_fam || '',
        nb_enfants:    userProfile.nb_enfants    || '',
      });
    }
  }, [userProfile]);

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const filled = [form.genre, form.tranche_age, form.ville, form.situation_fam].filter(Boolean).length;
  const total  = 4;
  const pctFill = Math.round((filled / total) * 100);

  async function saveProfile() {
    setSaving(true);
    const profil_complet = filled === total;
    const { error } = await sb.from('users').update({ ...form, profil_complet }).eq('id', user.id);
    setSaving(false);
    if (!error) { setSaved(true); onProfileUpdate?.(); setTimeout(() => setSaved(false), 2500); toast('✅ Profil mis à jour !', 'ok'); }
    else toast('❌ ' + error.message, 'err');
  }

  // Style bouton sélectionnable — vert si rempli, rouge si sélection active
  const btnStyle = (fieldVal, val) => ({
    padding: '8px 14px', borderRadius: 10, fontFamily: 'Nunito', fontSize: 13, fontWeight: 800, cursor: 'pointer',
    transition: 'all 0.15s',
    border: `1.5px solid ${fieldVal === val ? 'var(--green)' : 'var(--border)'}`,
    background: fieldVal === val ? '#e8faf5' : 'var(--white)',
    color: fieldVal === val ? '#0a8c63' : 'var(--muted)',
  });

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)' }}>
      {/* Header */}
      <div style={{ background: 'var(--dark)', padding: '0 28px', height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 100 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ background: 'var(--rouge)', borderRadius: 10, padding: '4px 12px', cursor: 'pointer' }} onClick={onGoFeed}>
            <span style={{ fontFamily: 'Scheherazade New, serif', fontSize: 16, color: 'white', fontWeight: 700 }}>فيدوستافيد</span>
          </div>
          <span style={{ color: 'rgba(255,255,255,0.4)', fontSize: 13 }}>|</span>
          <span style={{ color: 'rgba(255,255,255,0.7)', fontSize: 13, fontWeight: 800 }}>👤 Mon profil</span>
        </div>
        <button onClick={onGoFeed} style={{ background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.15)', color: 'rgba(255,255,255,0.6)', padding: '6px 14px', borderRadius: 8, fontSize: 12, fontWeight: 800, cursor: 'pointer', fontFamily: 'Nunito' }}>← Retour</button>
      </div>

      <div style={{ maxWidth: 720, margin: '0 auto', padding: '28px 20px 60px', display: 'flex', flexDirection: 'column', gap: 20 }}>

        {/* Carte identité */}
        <div style={{ background: 'var(--white)', border: '1.5px solid var(--border)', borderRadius: 16, padding: 24, display: 'flex', alignItems: 'center', gap: 20 }}>
          <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'linear-gradient(135deg, var(--rouge), var(--orange))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 26, fontWeight: 900, color: 'white', flexShrink: 0 }}>
            {(userProfile?.pseudo || user.email)[0].toUpperCase()}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 20, fontWeight: 900, color: 'var(--text)', marginBottom: 4 }}>{userProfile?.pseudo || 'Mon compte'}</div>
            <div style={{ fontSize: 12, color: 'var(--muted)', fontWeight: 600 }}>{user.email}</div>
          </div>
          <div style={{ display: 'flex', gap: 16, flexShrink: 0 }}>
            {[['🔥', userProfile?.score_reputation || 0, 'Score'],['📦', userProfile?.deals_soumis || 0, 'Soumis'],['✅', userProfile?.deals_valides || 0, 'Validés']].map(([icon, val, label]) => (
              <div key={label} style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 20, fontWeight: 900, color: 'var(--rouge)' }}>{icon} {val}</div>
                <div style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1 }}>{label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Profil démographique */}
        <div style={{ background: 'var(--white)', border: '1.5px solid var(--border)', borderRadius: 16, overflow: 'hidden' }}>
          {/* Header avec barre de progression */}
          <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)', background: 'var(--bg)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
              <span style={{ fontSize: 15, fontWeight: 900, color: 'var(--text)' }}>📊 Profil consommateur</span>
              <span style={{ marginLeft: 'auto', fontSize: 12, fontWeight: 800, color: pctFill === 100 ? '#0a8c63' : '#cc8800' }}>
                {pctFill === 100 ? '✅ Complet' : `${filled}/${total} renseigné${filled > 1 ? 's' : ''}`}
              </span>
            </div>
            {/* Barre de progression */}
            <div style={{ height: 6, background: 'var(--border)', borderRadius: 20, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${pctFill}%`, background: pctFill === 100 ? 'var(--green)' : 'var(--orange)', borderRadius: 20, transition: 'width 0.4s ease' }} />
            </div>
            {pctFill < 100 && (
              <div style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 600, marginTop: 8, lineHeight: 1.6, background: '#fff8e0', border: '1px solid #ffe066', borderRadius: 8, padding: '8px 12px' }}>
                💡 Ces infos nous permettent de te proposer des deals adaptés à ton profil.
              </div>
            )}
          </div>

          <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 20 }}>

            {/* Genre */}
            <div>
              <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>Genre</div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {[['homme','👨 Homme'],['femme','👩 Femme'],['non_precise','— Ne pas préciser']].map(([val, label]) => (
                  <button key={val} onClick={() => set('genre', val)} style={btnStyle(form.genre, val)}>{label}</button>
                ))}
              </div>
            </div>

            {/* Tranche d'âge */}
            <div>
              <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>Tranche d'âge</div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {['18-24','25-34','35-44','45-54','55+'].map(val => (
                  <button key={val} onClick={() => set('tranche_age', val)} style={btnStyle(form.tranche_age, val)}>{val} ans</button>
                ))}
              </div>
            </div>

            {/* Ville */}
            <div>
              <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>Ta ville</div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {VILLES.slice(1).map(val => (
                  <button key={val} onClick={() => set('ville', val)} style={btnStyle(form.ville, val)}>{val}</button>
                ))}
              </div>
            </div>

            {/* Situation familiale */}
            <div>
              <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>Situation familiale</div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {[['celibataire','🙋 Célibataire'],['en_couple','💑 En couple'],['marie','💍 Marié(e)'],['marie_enfants','👨‍👩‍👧 Marié(e) avec enfants']].map(([val, label]) => (
                  <button key={val} onClick={() => set('situation_fam', val)} style={btnStyle(form.situation_fam, val)}>{label}</button>
                ))}
              </div>
            </div>

            {/* Enfants — si marié */}
            {(form.situation_fam === 'marie' || form.situation_fam === 'marie_enfants') && (
              <div>
                <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>Nombre d'enfants</div>
                <div style={{ display: 'flex', gap: 8 }}>
                  {[['0','Aucun'],['1-2','1 ou 2'],['3+','3 ou plus']].map(([val, label]) => (
                    <button key={val} onClick={() => set('nb_enfants', val)} style={btnStyle(form.nb_enfants, val)}>{label}</button>
                  ))}
                </div>
              </div>
            )}

            <button onClick={saveProfile} disabled={saving}
              style={{ background: saved ? 'var(--green)' : 'var(--rouge)', color: 'white', border: 'none', padding: 13, borderRadius: 12, fontSize: 15, fontWeight: 900, cursor: saving ? 'not-allowed' : 'pointer', fontFamily: 'Nunito', opacity: saving ? 0.7 : 1, transition: 'all 0.2s' }}>
              {saving ? '⏳ Enregistrement...' : saved ? '✅ Profil sauvegardé !' : pctFill === 100 ? '💾 Mettre à jour' : '💾 Sauvegarder'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
//  APP PRINCIPALE
// ══════════════════════════════════════════
function App() {
  const [user, setUser]           = useState(null);
  const [userProfile, setProfile] = useState(null);
  const [isAdmin, setIsAdmin]     = useState(null); // null=chargement, true/false
  const [route, setRoute]         = useState(location.hash.replace('#','') || 'feed');
  const [deals, setDeals]         = useState([]);
  const [loading, setLoading]     = useState(true);
  const [modal, setModal]         = useState(null);
  const [authTab, setAuthTab]     = useState('login');
  const [selectedDeal, setDeal]   = useState(null);
  const [filterCat, setFilterCat] = useState('Tout');
  const [filterVille, setFilterVille] = useState('');
  const [filterSort, setFilterSort]   = useState('score');
  const [filterSearch, setFilterSearch] = useState('');
  const [showProfileMenu, setProfileMenu] = useState(false);
  const profileRef = useRef(null);

  // Routing via hash
  useEffect(() => {
    const onHash = () => {
      const hash = location.hash.replace('#', '') || 'feed';
      if (hash.startsWith('deal-')) {
        openDealById(hash.replace('deal-', ''));
      } else {
        setDeal(null);
        setRoute(hash);
      }
    };
    window.addEventListener('hashchange', onHash);
    // Gère le hash initial au chargement
    const initial = location.hash.replace('#', '');
    if (initial.startsWith('deal-')) openDealById(initial.replace('deal-', ''));
    return () => window.removeEventListener('hashchange', onHash);
  }, [openDealById]);

  const goTo = (r) => { location.hash = r; setRoute(r); };

  // Ouvre un deal par son ID depuis le hash
  const openDealById = useCallback(async (id) => {
    const numId = parseInt(id);
    if (!numId) return;
    // Cherche d'abord dans les deals déjà chargés
    const found = deals.find(d => d.id === numId);
    if (found) { setDeal(found); return; }
    // Sinon fetch depuis Supabase
    const { data } = await sb.from('deals').select('*').eq('id', numId).maybeSingle();
    if (data) setDeal(data);
  }, [deals]);

  // Ferme le menu profil si clic ailleurs
  useEffect(() => {
    const handler = (e) => { if (profileRef.current && !profileRef.current.contains(e.target)) setProfileMenu(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  // Auth init
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      if (session?.user) { loadProfile(session.user.id); checkIsAdmin(session.user.id).then(setIsAdmin); }
      else setIsAdmin(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      setUser(session?.user ?? null);
      if (session?.user) { loadProfile(session.user.id); checkIsAdmin(session.user.id).then(setIsAdmin); }
      else { setProfile(null); setIsAdmin(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  async function loadProfile(uid) {
    const { data } = await sb.from('users').select('*').eq('id', uid).maybeSingle();
    setProfile(data);
  }

  useEffect(() => { loadDeals(); }, [filterCat, filterVille, filterSort, filterSearch]);

  // Bloque le scroll du body quand une modal est ouverte
  useEffect(() => {
    document.body.style.overflow = modal ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [modal]);

  async function loadDeals() {
    setLoading(true);
    let q = sb.from('deals').select('*').eq('statut', 'validé');
    if (filterCat !== 'Tout') q = q.eq('categorie', filterCat);
    if (filterVille) q = q.eq('ville', filterVille);
    if (filterSearch.trim()) q = q.ilike('titre', `%${filterSearch.trim()}%`);
    if (filterSort === 'score')  q = q.order('score', { ascending: false });
    if (filterSort === 'recent') q = q.order('created_at', { ascending: false });
    const { data } = await q;
    if (!data) { setDeals([]); setLoading(false); return; }

    // Enrichit avec les pseudos des posteurs
    const userIds = [...new Set(data.map(d => d.user_id).filter(Boolean))];
    if (userIds.length > 0) {
      const { data: usersData } = await sb.from('users').select('id, pseudo').in('id', userIds);
      const userMap = {};
      (usersData || []).forEach(u => { userMap[u.id] = u.pseudo; });
      setDeals(data.map(d => ({ ...d, poster_pseudo: userMap[d.user_id] || null })));
    } else {
      setDeals(data);
    }
    setLoading(false);
  }

  const [votingId, setVotingId] = useState(null); // bloque double-clic

  async function handleVote(dealId, type) {
    if (!user || !user.id) { setAuthTab('login'); setModal('auth'); return; }
    if (votingId === dealId) return;
    setVotingId(dealId);

    try {
      // 1. Cherche le vote existant de cet utilisateur
      const { data: existing } = await sb
        .from('votes')
        .select('id, type')
        .eq('deal_id', dealId)
        .eq('user_id', user.id)
        .maybeSingle();

      if (existing) {
        if (existing.type === type) {
          // Même bouton → retire le vote
          await sb.from('votes').delete().eq('id', existing.id);
          toast('Vote retiré.', 'ok');
        } else {
          // Bouton opposé → change le vote (un seul UPDATE, pas delete+insert)
          await sb.from('votes').update({ type }).eq('id', existing.id);
          toast(type === 'chaud' ? 'ربح ✓' : 'خسارة ✓', 'ok');
        }
      } else {
        // Pas de vote → nouveau vote
        const { error } = await sb.from('votes').insert({ deal_id: dealId, user_id: user.id, type });
        if (error) { toast('Erreur vote.', 'err'); return; }
        toast(type === 'chaud' ? 'ربح ✓' : 'خسارة ✓', 'ok');
      }

      // 2. Recalcule le vrai score depuis la BDD (source de vérité)
      const up   = await sb.from('votes').select('id', { count: 'exact' }).eq('deal_id', dealId).eq('type', 'chaud');
      const down = await sb.from('votes').select('id', { count: 'exact' }).eq('deal_id', dealId).eq('type', 'froid');
      const newScore = (up.count || 0) - (down.count || 0);

      // 3. Met à jour le score en BDD
      await sb.from('deals').update({ score: newScore }).eq('id', dealId);

      // 4. Met à jour l'affichage
      setDeals(prev => prev.map(d => d.id === dealId ? { ...d, score: newScore } : d));
      if (selectedDeal?.id === dealId) setDeal(prev => ({ ...prev, score: newScore }));

    } finally {
      setVotingId(null);
    }
  }

  async function logout() {
    await sb.auth.signOut();
    setProfileMenu(false);
    setIsAdmin(false);
    toast('Déconnecté. À bientôt !', 'ok');
  }

  // ── ROUTE ADMIN ──
  if (route === 'admin') {
    return (
      <>
        <ToastContainer />
        <AdminPage user={user} isAdmin={isAdmin} onGoFeed={() => goTo('feed')} />
      </>
    );
  }

  // ── ROUTE PROFIL ──
  if (route === 'profil') {
    return (
      <>
        <ToastContainer />
        <ProfilPage
          user={user}
          userProfile={userProfile}
          onGoFeed={() => goTo('feed')}
          onProfileUpdate={() => loadProfile(user.id)}
        />
      </>
    );
  }

  // ── ROUTE DEALS ──
  if (route === 'deals') {
    return (
      <>
        <ToastContainer />
        <MesDealsPage
          user={user}
          userProfile={userProfile}
          onGoFeed={() => goTo('feed')}
        />
      </>
    );
  }

  // ── ROUTE FEED (principale) ──
  return (
    <>
      <ToastContainer />

      {/* TOPBAR */}
      <div className="topbar">
        <div className="logo-pill" onClick={() => { setDeal(null); goTo('feed'); }}>
          <svg className="logo-seal" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="sbg" cx="45%" cy="40%" r="60%">
                <stop offset="0%" stopColor="#2a1a0e"/>
                <stop offset="100%" stopColor="#1a0e06"/>
              </radialGradient>
              <linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#ffd43b"/>
                <stop offset="50%" stopColor="#ff922b"/>
                <stop offset="100%" stopColor="#f03e3e"/>
              </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="48" fill="url(#sbg)"/>
            <circle cx="50" cy="50" r="46" fill="none" stroke="url(#sg1)" strokeWidth="1.5"/>
            <circle cx="50" cy="50" r="40" fill="none" stroke="#ff922b" strokeWidth="0.5" strokeDasharray="2.5,4" opacity="0.6"/>
            <polygon points="50,3 52,7 50,11 48,7" fill="#ffd43b" opacity="0.9"/>
            <polygon points="50,89 52,93 50,97 48,93" fill="#ffd43b" opacity="0.9"/>
            <polygon points="3,50 7,48 11,50 7,52" fill="#ffd43b" opacity="0.9"/>
            <polygon points="89,50 93,48 97,50 93,52" fill="#ffd43b" opacity="0.9"/>
            <text x="50" y="38" fontFamily="'Scheherazade New', serif" fontSize="22" fontWeight="700" fill="url(#sg1)" textAnchor="middle">فيد</text>
            <line x1="22" y1="48" x2="36" y2="48" stroke="#ff922b" strokeWidth="0.7" opacity="0.7"/>
            <circle cx="22" cy="48" r="1.5" fill="#ff922b" opacity="0.7"/>
            <text x="50" y="53" fontFamily="'Scheherazade New', serif" fontSize="11" fontWeight="400" fill="#ff922b" textAnchor="middle" opacity="0.85">و</text>
            <line x1="64" y1="48" x2="78" y2="48" stroke="#ff922b" strokeWidth="0.7" opacity="0.7"/>
            <circle cx="78" cy="48" r="1.5" fill="#ff922b" opacity="0.7"/>
            <text x="50" y="70" fontFamily="'Scheherazade New', serif" fontSize="20" fontWeight="700" fill="#f03e3e" textAnchor="middle">ستافيد</text>
          </svg>
        </div>

        <div className="topbar-right">
          {user ? (
            <>
              {isAdmin && (
                <button className="btn-nav" style={{ background: '#fff8e0', color: '#cc8800' }}
                  onClick={() => goTo('admin')}>
                  ⚙️ Admin
                </button>
              )}
              <button className="btn-nav btn-submit-nav" onClick={() => setModal('submit')}>
                <span>+</span><span className="btn-submit-text"> Soumettre un deal</span>

              <div style={{ position: 'relative' }} ref={profileRef}>
                <div className="user-pill" onClick={() => setProfileMenu(p => !p)}>
                  <div className="user-avatar">
                    {(userProfile?.pseudo || user.email)[0].toUpperCase()}
                  </div>
                  <span className="user-pseudo">{userProfile?.pseudo || 'Mon compte'}</span>
                  <span style={{ fontSize: 10, color: 'var(--muted)' }}>▾</span>
                </div>
                {showProfileMenu && (
                  <div className="profile-menu">
                    <div className="profile-menu-header">
                      <div className="profile-menu-pseudo">{userProfile?.pseudo || 'Mon profil'}</div>
                      <div className="profile-menu-email">{user.email}</div>
                    </div>
                    <button className="profile-menu-item" onClick={() => { setProfileMenu(false); goTo('profil'); }}>👤 Mon profil</button>
                    <button className="profile-menu-item" onClick={() => { setProfileMenu(false); goTo('deals'); }}>📋 Mes deals soumis</button>
                    {isAdmin && <button className="profile-menu-item" onClick={() => { setProfileMenu(false); goTo('admin'); }}>⚙️ Interface Admin</button>}
                    <button className="profile-menu-item danger" onClick={logout}>🚪 Déconnexion</button>
                  </div>
                )}
              </div>
            </>
          ) : (
            <>
              <button className="btn-nav btn-login" onClick={() => { setAuthTab('login'); setModal('auth'); }}>Connexion</button>
              <button className="btn-nav btn-signup" onClick={() => { setAuthTab('signup'); setModal('auth'); }}>S'inscrire</button>
            </>
          )}
        </div>
      </div>

      {/* ── TICKER ── */}
      {!selectedDeal && (
        <div className="ticker-bar">
          <div className="ticker-track">
            {[
              { num: '1', fr: 'Tu trouves une أميزة en faisant tes courses', ar: 'لقيتي الأميزة ديالك ؟' },
              { num: '2', fr: 'Tu la partages en 30 secondes chrono', ar: 'شاركها مع الجماعة' },
              { num: '3', fr: 'La communauté vote — les meilleures أميزات remontent', ar: 'الجماعة تقيّم' },
              { num: '🔥', fr: 'fidwastafid.com — partage et fais profiter', ar: 'فيد و ستافيد' },
            ].concat([
              { num: '1', fr: 'Tu trouves une أميزة en faisant tes courses', ar: 'لقيتي الأميزة ديالك ؟' },
              { num: '2', fr: 'Tu la partages en 30 secondes chrono', ar: 'شاركها مع الجماعة' },
              { num: '3', fr: 'La communauté vote — les meilleures أميزات remontent', ar: 'الجماعة تقيّم' },
              { num: '🔥', fr: 'fidwastafid.com — partage et fais profiter', ar: 'فيد و ستافيد' },
            ]).map((item, i) => (
              <span key={i} className="ticker-item">
                <span className="num">{item.num}</span>
                {item.fr}
                <span className="ar">— {item.ar}</span>
              </span>
            ))}
          </div>
        </div>
      )}

      {/* ── NAV MOBILE EN HAUT ── */}
      <div className="mobile-top-nav">
        <div className="mob-search">
          <div className="mob-search-wrap">
            <span className="mob-search-icon">🔍</span>
            <input className="mob-search-input" placeholder="Chercher un deal..."
              value={filterSearch || ''}
              onChange={e => { setDeal(null); setFilterSearch(e.target.value); }}
            />
          </div>
        </div>
        <div className="mob-tabs">
          <button className={`mob-tab ${filterSort === 'score' ? 'sort-active' : ''}`}
            onClick={() => { setDeal(null); setFilterSort('score'); }}>🔥 Chauds</button>
          <button className={`mob-tab ${filterSort === 'recent' ? 'sort-active' : ''}`}
            onClick={() => { setDeal(null); setFilterSort('recent'); }}>⚡ Récents</button>
          <div style={{ width: 1, background: 'var(--border)', margin: '4px 2px', flexShrink: 0 }} />
          {['Tout', ...CATEGORIES].map(cat => (
            <button key={cat} className={`mob-tab ${filterCat === cat ? 'active' : ''}`}
              onClick={() => { setDeal(null); setFilterCat(cat); }}>
              {cat === 'Tout' ? '🛍️ Tout' : `${CAT_ICONS[cat] || ''} ${cat}`}
            </button>
          ))}
        </div>

      {selectedDeal && (

      )}

      {/* LAYOUT */}
      <div className="layout" style={{ display: selectedDeal ? 'none' : 'grid' }}>
        <nav className="sidebar">
          <div className="sidebar-brand">
            <svg className="logo-seal-sidebar" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="sbg2" cx="45%" cy="40%" r="60%">
                  <stop offset="0%" stopColor="#2a1a0e"/>
                  <stop offset="100%" stopColor="#1a0e06"/>
                </radialGradient>
                <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#ffd43b"/>
                  <stop offset="50%" stopColor="#ff922b"/>
                  <stop offset="100%" stopColor="#f03e3e"/>
                </linearGradient>
              </defs>
              <circle cx="50" cy="50" r="48" fill="url(#sbg2)"/>
              <circle cx="50" cy="50" r="46" fill="none" stroke="url(#sg2)" strokeWidth="1.5"/>
              <circle cx="50" cy="50" r="40" fill="none" stroke="#ff922b" strokeWidth="0.5" strokeDasharray="2.5,4" opacity="0.6"/>
              <polygon points="50,3 52,7 50,11 48,7" fill="#ffd43b" opacity="0.9"/>
              <polygon points="50,89 52,93 50,97 48,93" fill="#ffd43b" opacity="0.9"/>
              <polygon points="3,50 7,48 11,50 7,52" fill="#ffd43b" opacity="0.9"/>
              <polygon points="89,50 93,48 97,50 93,52" fill="#ffd43b" opacity="0.9"/>
              <text x="50" y="38" fontFamily="'Scheherazade New', serif" fontSize="22" fontWeight="700" fill="url(#sg2)" textAnchor="middle">فيد</text>
              <line x1="22" y1="48" x2="36" y2="48" stroke="#ff922b" strokeWidth="0.7" opacity="0.7"/>
              <circle cx="22" cy="48" r="1.5" fill="#ff922b" opacity="0.7"/>
              <text x="50" y="53" fontFamily="'Scheherazade New', serif" fontSize="11" fontWeight="400" fill="#ff922b" textAnchor="middle" opacity="0.85">و</text>
              <line x1="64" y1="48" x2="78" y2="48" stroke="#ff922b" strokeWidth="0.7" opacity="0.7"/>
              <circle cx="78" cy="48" r="1.5" fill="#ff922b" opacity="0.7"/>
              <text x="50" y="70" fontFamily="'Scheherazade New', serif" fontSize="20" fontWeight="700" fill="#f03e3e" textAnchor="middle">ستافيد</text>
            </svg>
            <div className="sub">Bons plans marocains 🇲🇦</div>
          </div>
          <div className="sidebar-section">Trier par</div>
          <button className={`sidebar-btn ${filterSort === 'score' ? 'active' : ''}`} onClick={() => { setDeal(null); setFilterSort('score'); }}>🔥 Les plus chauds</button>

          <>
              {/* ── HERO : inline sur desktop, popup sur mobile ── */}
              <HeroBand />

              <div className="filters-bar">
                <span style={{ fontWeight: 900, fontSize: 13 }}>🔥 Bons plans</span>
                <div className="filter-wrap">
                  <select className="filter-select" value={filterVille} onChange={e => setFilterVille(e.target.value)}>
                    <option value="">📍 Toutes les villes</option>
                    {VILLES.slice(1).map(v => <option key={v} value={v}>📍 {v}</option>)}
                  </select>
                </div>
                <button className={`filter-pill ${filterCat === 'Tout' ? 'active' : ''}`} onClick={() => setFilterCat('Tout')}>Tous</button>
                {CATEGORIES.slice(0, 4).map(c => (
                  <button key={c} className={`filter-pill ${filterCat === c ? 'active' : ''}`} onClick={() => setFilterCat(c)}>
                    {CAT_ICONS[c]} {c}
                  </button>
                ))}
              </div>
              {loading ? (
                <div className="loader">⏳ Chargement des deals...</div>
              ) : deals.length === 0 ? (
                <div className="empty"><div className="icon">🔍</div><div className="msg">Aucun deal trouvé pour ces filtres.</div></div>
              ) : (
                <div className="feed-grid">
                  {deals.map(d => (
                    <DealCard key={d.id} deal={d} user={user} onVote={handleVote} onClick={d => { location.hash = `deal-${d.id}`; setDeal(d); }} votingId={votingId} />
                  ))}
                </div>
              )}
            </>
        </main>
      </div>

      {modal === 'auth' && (
        <AuthModal defaultTab={authTab} onClose={() => setModal(null)} onSuccess={(u) => { setUser(u); setModal(null); }} />
      )}
      {modal === 'submit' && (
        <SubmitDealModal user={user} onClose={() => setModal(null)} onSuccess={() => { loadDeals(); toast('🔥 Deal soumis ! Merci.', 'ok'); }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
