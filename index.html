<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فيدوستافيد — Fidwastafid</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --rouge:  #f03e3e;
    --rouge2: #ff6b6b;
    --orange: #ff922b;
    --yellow: #ffd43b;
    --green:  #20c997;
    --blue:   #339af0;
    --bg:     #f8f6f2;
    --white:  #ffffff;
    --text:   #1a1a1a;
    --muted:  #888888;
    --border: #e8e4de;
    --dark:   #1e1e1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .logo-pill {
    background: var(--rouge);
    border-radius: 12px;
    padding: 5px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    text-decoration: none;
  }

  .logo-ar  { font-family: 'Noto Naskh Arabic', serif; font-size: 17px; font-weight: 700; color: white; line-height: 1; }
  .logo-lat { font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.7); }

  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .btn-nav {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 800;
    padding: 7px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-login  { background: var(--bg); color: var(--muted); }
  .btn-login:hover { background: var(--border); color: var(--text); }
  .btn-signup { background: var(--rouge); color: white; }
  .btn-signup:hover { background: #d63030; }
  .btn-submit-nav { background: linear-gradient(135deg, var(--rouge), var(--orange)); color: white; }
  .btn-submit-nav:hover { opacity: 0.9; }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px 5px 6px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .user-pill:hover { border-color: var(--rouge2); }
  .user-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rouge), var(--orange));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    color: white;
  }
  .user-pseudo { font-size: 12px; font-weight: 800; color: var(--text); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }

  .sidebar-brand {
    padding: 4px 16px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    text-align: center;
  }
  .sidebar-brand .ar { font-family: 'Noto Naskh Arabic', serif; font-size: 22px; font-weight: 700; color: var(--rouge); display: block; }
  .sidebar-brand .sub { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 2px; }

  .sidebar-section { padding: 8px 16px 4px; font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #ccc; }

  .sidebar-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    background: none;
    border: none;
    border-left: 3px solid transparent;
    width: 100%;
    text-align: left;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.12s;
  }
  .sidebar-btn:hover { background: var(--bg); color: var(--text); }
  .sidebar-btn.active { color: var(--rouge); background: #fff5f5; border-left-color: var(--rouge); }

  .sidebar-cats { padding: 8px 16px; display: flex; flex-direction: column; gap: 2px; }
  .cat-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    text-align: left;
    transition: all 0.1s;
  }
  .cat-btn:hover, .cat-btn.active { background: #fff0f0; color: var(--rouge); }

  .sidebar-cta {
    margin: 16px 12px 0;
    background: linear-gradient(135deg, var(--rouge), var(--orange));
    border-radius: 14px;
    padding: 14px;
    color: white;
    text-align: center;
    cursor: pointer;
  }
  .sidebar-cta .ar { font-family: 'Noto Naskh Arabic', serif; font-size: 16px; font-weight: 700; display: block; }
  .sidebar-cta .sub { font-size: 10px; opacity: 0.8; margin-top: 2px; }

  /* ── MAIN ── */
  .main { padding: 24px 28px 80px; }

  /* ── DEAL CARD ── */
  .feed-grid { display: flex; flex-direction: column; gap: 10px; }

  .deal-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 64px 1fr auto;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .deal-card:hover { border-color: var(--rouge2); box-shadow: 0 4px 16px rgba(240,62,62,0.08); }

  .deal-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 12px 0;
    background: var(--bg);
    border-right: 1px solid var(--border);
  }

  .score-fire-btn, .score-ice-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background 0.1s;
    line-height: 1;
  }
  .score-fire-btn:hover { background: #fff0f0; }
  .score-ice-btn:hover  { background: #f0f4ff; }
  .score-fire-btn.voted { background: #fff0f0; }
  .score-ice-btn.voted  { background: #f0f4ff; }

  .score-num {
    font-size: 16px;
    font-weight: 900;
    color: var(--rouge);
    line-height: 1;
  }
  .score-num.cold { color: var(--blue); }

  .deal-body { padding: 12px 16px; }

  .deal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }

  .deal-tag {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .tag-cat  { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .tag-type { background: #fff0f0; color: var(--rouge); }
  .tag-new  { background: var(--yellow); color: #7a5c00; }
  .tag-hot  { background: linear-gradient(135deg, #ff4d4d, #ff8c00); color: white; }

  .deal-title { font-size: 15px; font-weight: 900; color: var(--text); margin-bottom: 6px; }

  .deal-price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .price-promo    { font-size: 20px; font-weight: 900; color: var(--rouge); }
  .price-normal   { font-size: 13px; font-weight: 700; color: var(--muted); text-decoration: line-through; }
  .price-discount { font-size: 11px; font-weight: 800; background: #e8faf5; color: #0a8c63; padding: 2px 7px; border-radius: 20px; }

  .deal-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .deal-meta span { font-size: 11px; font-weight: 700; color: var(--muted); display: flex; align-items: center; gap: 3px; }

  .deal-actions {
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-left: 1px solid var(--border);
  }

  .deal-comment-count {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-align: center;
  }

  /* ── FILTRES ── */
  .filters-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.12s;
  }
  .filter-pill:hover, .filter-pill.active { border-color: var(--rouge); color: var(--rouge); background: #fff5f5; }

  .filter-select {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    appearance: none;
    padding-right: 28px;
  }

  .filter-wrap { position: relative; }
  .filter-wrap::after { content: '▾'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 20px;
    backdrop-filter: blur(2px);
  }

  .modal {
    background: var(--white);
    border-radius: 20px;
    width: 100%;
    max-width: 440px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title { font-size: 18px; font-weight: 900; color: var(--text); }
  .modal-title .ar { font-family: 'Noto Naskh Arabic', serif; color: var(--rouge); }

  .modal-close {
    background: var(--bg);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: all 0.12s;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }

  .modal-body { padding: 24px; }

  .modal-tabs {
    display: flex;
    background: var(--bg);
    border-radius: 12px;
    padding: 3px;
    margin-bottom: 20px;
    gap: 2px;
  }

  .modal-tab {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: none;
    background: none;
    font-size: 13px;
    font-weight: 800;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.12s;
  }
  .modal-tab.active { background: var(--white); color: var(--rouge); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  /* ── FORM ── */
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }

  .field label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .field input, .field select, .field textarea {
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    color: var(--text);
    background: var(--white);
    transition: border-color 0.15s;
    width: 100%;
  }

  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--rouge);
    background: #fffafa;
  }

  .field textarea { resize: vertical; min-height: 90px; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .price-input-wrap { position: relative; }
  .price-input-wrap input { padding-right: 50px; }
  .price-unit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; font-weight: 800; color: var(--muted); }

  .discount-preview {
    margin-top: 6px;
    font-size: 12px;
    font-weight: 800;
    color: #0a8c63;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-full {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-rouge { background: var(--rouge); color: white; }
  .btn-rouge:hover { background: #d63030; }
  .btn-rouge:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-gradient { background: linear-gradient(135deg, var(--rouge), var(--orange)); color: white; }
  .btn-gradient:hover { opacity: 0.9; }
  .btn-gradient:disabled { opacity: 0.6; cursor: not-allowed; }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
  }
  .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .auth-switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); font-weight: 600; }
  .auth-switch button { background: none; border: none; color: var(--rouge); font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 13px; }

  .error-banner {
    background: #fff0f0;
    border: 1.5px solid #ffc9c9;
    color: var(--rouge);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .success-banner {
    background: #e8faf5;
    border: 1.5px solid #a8e6d4;
    color: #0a5c42;
    padding: 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .success-banner .big { font-size: 32px; }

  /* ── FICHE DEAL (page détail) ── */
  .deal-detail {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    max-width: 680px;
  }

  .deal-detail-header {
    background: var(--dark);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: background 0.1s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.18); }

  .deal-detail-title { font-size: 18px; font-weight: 900; color: white; }

  .deal-detail-body { padding: 24px; }

  .vote-zone {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
  }

  .vote-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--white);
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.15s;
  }
  .vote-btn.fire       { color: var(--rouge); }
  .vote-btn.fire:hover, .vote-btn.fire.voted { border-color: var(--rouge); background: #fff5f5; }
  .vote-btn.ice        { color: var(--blue); }
  .vote-btn.ice:hover, .vote-btn.ice.voted { border-color: var(--blue); background: #f0f8ff; }

  .score-big { font-size: 28px; font-weight: 900; color: var(--rouge); }

  /* ── PROFIL DROPDOWN ── */
  .profile-menu {
    position: absolute;
    top: 56px;
    right: 16px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    z-index: 250;
    min-width: 200px;
    overflow: hidden;
    animation: modalIn 0.15s ease;
  }

  .profile-menu-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .profile-menu-pseudo { font-size: 13px; font-weight: 900; color: var(--text); }
  .profile-menu-email  { font-size: 11px; color: var(--muted); font-weight: 600; }

  .profile-menu-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: background 0.1s;
  }
  .profile-menu-item:hover { background: var(--bg); }
  .profile-menu-item.danger { color: var(--rouge); }

  /* ── EMPTY / LOADING ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty .msg  { font-size: 14px; font-weight: 700; }

  .loader { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; font-weight: 700; }

  /* ── TOAST ── */
  .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 400; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }

  .toast {
    background: var(--dark);
    color: white;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 8px;
    animation: toastIn 0.25s ease;
    max-width: 280px;
  }
  .toast.ok  { border-left: 3px solid var(--green); }
  .toast.err { border-left: 3px solid var(--rouge); }

  @keyframes toastIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── SOUMISSION STEPS ── */
  .steps-indicator {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 24px;
  }

  .step-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 900;
    color: var(--muted);
    background: var(--white);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .step-dot.done   { background: var(--green); border-color: var(--green); color: white; }
  .step-dot.active { background: var(--rouge); border-color: var(--rouge); color: white; }

  .step-line { flex: 1; height: 2px; background: var(--border); }
  .step-line.done { background: var(--green); }

  .step-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    margin-bottom: 20px;
  }
  .step-label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--muted); }
  .step-label.active { color: var(--rouge); }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 16px; }
    .deal-card { grid-template-columns: 56px 1fr; }
    .deal-actions { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─────────────────────────────────────────

const SUPABASE_URL  = 'https://laqwgehhedvxaqucmeeh.supabase.co';
const SUPABASE_ANON = 'sb_publishable_pTmj1luXr1jVb1rdAm2uzw_me78zTjc';

//  TOAST SYSTEM
// ══════════════════════════════════════════
let _addToast = null;

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  _addToast = useCallback((msg, type = 'ok') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000);
  }, []);
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

const toast = (msg, type) => _addToast?.(msg, type);

// ══════════════════════════════════════════
//  MODAL AUTH (Connexion / Inscription)
// ══════════════════════════════════════════
function AuthModal({ onClose, onSuccess, defaultTab = 'login' }) {
  const [tab, setTab]         = useState(defaultTab); // 'login' | 'signup'
  const [email, setEmail]     = useState('');
  const [password, setPass]   = useState('');
  const [pseudo, setPseudo]   = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const [done, setDone]       = useState(false);

  const reset = () => { setEmail(''); setPass(''); setPseudo(''); setError(''); setDone(false); setLoading(false); };

  const handleTab = (t) => { reset(); setTab(t); };

  // ── CONNEXION ──
  async function handleLogin() {
    if (!email || !password) return setError('Remplis tous les champs.');
    setLoading(true); setError('');
    const { data, error: err } = await sb.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (err) return setError('Email ou mot de passe incorrect.');
    toast('👋 Marhba ! Connecté avec succès.', 'ok');
    onSuccess(data.user);
  }

  // ── INSCRIPTION ──
  async function handleSignup() {
    if (!email || !password || !pseudo) return setError('Remplis tous les champs.');
    if (password.length < 6) return setError('Le mot de passe doit faire au moins 6 caractères.');
    if (pseudo.length < 3)   return setError('Le pseudo doit faire au moins 3 caractères.');
    setLoading(true); setError('');

    // Vérifie si le pseudo est dispo
    const { data: existing } = await sb.from('users').select('id').eq('pseudo', pseudo).maybeSingle();
    if (existing) { setLoading(false); return setError('Ce pseudo est déjà pris.'); }

    const { data, error: err } = await sb.auth.signUp({ email, password });
    if (err) { setLoading(false); return setError(err.message); }

    // Créer le profil dans la table users
    if (data.user) {
      await sb.from('users').insert({ id: data.user.id, pseudo });
    }

    setLoading(false);
    setDone(true);
  }

  return (
    <div className="modal-overlay" onClick={null}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">
            {tab === 'login' ? 'Connexion' : 'Rejoins'} <span className="ar">فيدوستافيد</span>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="modal-tabs">
            <button className={`modal-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => handleTab('login')}>Se connecter</button>
            <button className={`modal-tab ${tab === 'signup' ? 'active' : ''}`} onClick={() => handleTab('signup')}>S'inscrire</button>
          </div>

          {done ? (
            <div className="success-banner">
              <span className="big">📬</span>
              <strong>Vérifie tes emails !</strong>
              <span>Un lien de confirmation a été envoyé à <strong>{email}</strong>. Clique dessus pour activer ton compte.</span>
            </div>
          ) : (
            <>
              {error && <div className="error-banner">⚠️ {error}</div>}

              {tab === 'signup' && (
                <div className="field">
                  <label>Pseudo *</label>
                  <input value={pseudo} onChange={e => setPseudo(e.target.value)}
                    placeholder="ex: casawi_deals" onKeyDown={e => e.key === 'Enter' && handleSignup()} />
                </div>
              )}

              <div className="field">
                <label>Email *</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                  placeholder="ton@email.com" onKeyDown={e => e.key === 'Enter' && (tab === 'login' ? handleLogin() : handleSignup())} />
              </div>

              <div className="field">
                <label>Mot de passe *</label>
                <input type="password" value={password} onChange={e => setPass(e.target.value)}
                  placeholder="••••••••" onKeyDown={e => e.key === 'Enter' && (tab === 'login' ? handleLogin() : handleSignup())} />
              </div>

              <button
                className="btn-full btn-rouge"
                onClick={tab === 'login' ? handleLogin : handleSignup}
                disabled={loading}
              >
                {loading ? '⏳ Chargement...' : tab === 'login' ? '🔑 Se connecter' : '🚀 Créer mon compte'}
              </button>

              <div className="auth-switch">
                {tab === 'login'
                  ? <>Pas encore de compte ? <button onClick={() => handleTab('signup')}>S'inscrire</button></>
                  : <>Déjà un compte ? <button onClick={() => handleTab('login')}>Se connecter</button></>
                }
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
//  MODAL SOUMISSION DEAL
// ══════════════════════════════════════════
function SubmitDealModal({ user, onClose, onSuccess }) {
  const [step, setStep] = useState(1); // 1 = infos | 2 = détails | 3 = confirmation
  const [form, setForm] = useState({
    titre: '', magasin: '', categorie: 'Alimentaire', ville: 'National',
    type: 'physique', prix_promo: '', prix_normal: '',
    description: '', lien: '', date_fin: ''
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [done, setDone] = useState(false);

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const discount = () => {
    const p = parseFloat(form.prix_promo), n = parseFloat(form.prix_normal);
    if (p && n && n > p) return Math.round((1 - p / n) * 100);
    return null;
  };

  function nextStep() {
    setError('');
    if (step === 1) {
      if (!form.titre.trim()) return setError('Donne un titre au deal.');
      if (!form.magasin.trim()) return setError('Indique le magasin ou site.');
      if (!form.prix_promo) return setError('Indique le prix promo.');
    }
    setStep(s => s + 1);
  }

  async function submit() {
    setLoading(true); setError('');
    const payload = {
      titre:       form.titre.trim(),
      magasin:     form.magasin.trim(),
      categorie:   form.categorie,
      ville:       form.ville,
      type:        form.type,
      prix_promo:  parseFloat(form.prix_promo),
      prix_normal: parseFloat(form.prix_normal) || 0,
      description: form.description.trim() || null,
      lien:        form.lien.trim() || null,
      date_fin:    form.date_fin || null,
      user_id:     user.id,
      statut:      'en_attente',
      score:       0
    };

    const { error: err } = await sb.from('deals').insert(payload);
    setLoading(false);
    if (err) return setError('Erreur : ' + err.message);
    setDone(true);
  }

  if (done) return (
    <div className="modal-overlay" onClick={null}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Deal soumis ! 🎉</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="success-banner">
            <span className="big">🔥</span>
            <strong>Shukran ! Ton deal est en cours de vérification.</strong>
            <span>Il sera publié dans le feed si notre équipe valide les infos. Tu seras notifié.</span>
          </div>
          <br />
          <button className="btn-full btn-gradient" onClick={() => { setDone(false); setStep(1); setForm({ titre:'', magasin:'', categorie:'Alimentaire', ville:'National', type:'physique', prix_promo:'', prix_normal:'', description:'', lien:'', date_fin:'' }); onSuccess?.(); onClose(); }}>
            Retour au feed
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={null}>
      <div className="modal" style={{ maxWidth: 500 }}>
        <div className="modal-header">
          <div className="modal-title">🔥 Soumettre un deal</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">

          {/* Indicateur d'étape */}
          <div className="steps-indicator">
            {[1,2,3].map((s, i) => (
              <React.Fragment key={s}>
                {i > 0 && <div className={`step-line ${step > i ? 'done' : ''}`}/>}
                <div className={`step-dot ${step > s ? 'done' : step === s ? 'active' : ''}`}>
                  {step > s ? '✓' : s}
                </div>
              </React.Fragment>
            ))}
          </div>
          <div className="step-labels">
            {['Infos de base', 'Détails', 'Confirmation'].map((l, i) => (
              <span key={l} className={`step-label ${step === i+1 ? 'active' : ''}`}>{l}</span>
            ))}
          </div>

          {error && <div className="error-banner">⚠️ {error}</div>}

          {/* ── ÉTAPE 1 : Infos de base ── */}
          {step === 1 && (
            <>
              <div className="field">
                <label>Titre du deal *</label>
                <input value={form.titre} onChange={e => set('titre', e.target.value)}
                  placeholder="ex: Huile Cristal 5L en promo chez Marjane" />
              </div>

              <div className="field-row">
                <div className="field">
                  <label>Magasin / Site *</label>
                  <input value={form.magasin} onChange={e => set('magasin', e.target.value)}
                    placeholder="ex: Marjane, Jumia..." />
                </div>
                <div className="field">
                  <label>Catégorie</label>
                  <select value={form.categorie} onChange={e => set('categorie', e.target.value)}>
                    {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                  </select>
                </div>
              </div>

              <div className="field">
                <label>Prix promo (MAD) *</label>
                <div className="price-input-wrap">
                  <input type="number" min="0" step="0.5" value={form.prix_promo}
                    onChange={e => set('prix_promo', e.target.value)} placeholder="89" />
                  <span className="price-unit">MAD</span>
                </div>
              </div>

              <div className="field">
                <label>Prix normal (MAD)</label>
                <div className="price-input-wrap">
                  <input type="number" min="0" step="0.5" value={form.prix_normal}
                    onChange={e => set('prix_normal', e.target.value)} placeholder="115" />
                  <span className="price-unit">MAD</span>
                </div>
                {discount() && (
                  <div className="discount-preview">✅ Réduction de -{discount()}% calculée automatiquement</div>
                )}
              </div>

              <button className="btn-full btn-rouge" onClick={nextStep}>Suivant →</button>
            </>
          )}

          {/* ── ÉTAPE 2 : Détails ── */}
          {step === 2 && (
            <>
              <div className="field-row">
                <div className="field">
                  <label>Ville</label>
                  <select value={form.ville} onChange={e => set('ville', e.target.value)}>
                    {VILLES.map(v => <option key={v}>{v}</option>)}
                  </select>
                </div>
                <div className="field">
                  <label>Type de deal</label>
                  <select value={form.type} onChange={e => set('type', e.target.value)}>
                    <option value="physique">🏪 Physique (magasin)</option>
                    <option value="online">🌐 En ligne</option>
                    <option value="les deux">↔️ Les deux</option>
                  </select>
                </div>
              </div>

              <div className="field">
                <label>Valable jusqu'au</label>
                <input type="date" value={form.date_fin} onChange={e => set('date_fin', e.target.value)} />
              </div>

              <div className="field">
                <label>Lien du deal (si en ligne)</label>
                <input type="url" value={form.lien} onChange={e => set('lien', e.target.value)}
                  placeholder="https://jumia.ma/..." />
              </div>

              <div className="field">
                <label>Description / Infos supplémentaires</label>
                <textarea value={form.description} onChange={e => set('description', e.target.value)}
                  placeholder="Conditions, où trouver le deal, durée, stock..." />
              </div>

              <div className="field-row">
                <button className="btn-full" style={{ background: 'var(--bg)', border: '1.5px solid var(--border)', fontFamily: 'Nunito', fontSize: 14, fontWeight: 800, cursor: 'pointer', padding: 13, borderRadius: 12, color: 'var(--muted)' }} onClick={() => setStep(1)}>
                  ← Retour
                </button>
                <button className="btn-full btn-rouge" onClick={nextStep}>Suivant →</button>
              </div>
            </>
          )}

          {/* ── ÉTAPE 3 : Récap + envoi ── */}
          {step === 3 && (
            <>
              <div style={{ background: 'var(--bg)', borderRadius: 14, padding: 16, marginBottom: 16, border: '1.5px solid var(--border)' }}>
                <div style={{ fontWeight: 900, fontSize: 15, marginBottom: 10 }}>{form.titre}</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {[
                    ['🏪 Magasin',    form.magasin],
                    ['📦 Catégorie',  form.categorie + ' ' + (CAT_ICONS[form.categorie] || '')],
                    ['💰 Prix promo', form.prix_promo + ' MAD' + (discount() ? ` (-${discount()}%)` : '')],
                    ['📍 Ville',      form.ville],
                    ['🌐 Type',       form.type],
                  ].map(([k, v]) => v ? (
                    <div key={k} style={{ display: 'flex', gap: 8, fontSize: 12 }}>
                      <span style={{ color: 'var(--muted)', fontWeight: 700, minWidth: 100 }}>{k}</span>
                      <span style={{ fontWeight: 800, color: 'var(--text)' }}>{v}</span>
                    </div>
                  ) : null)}
                </div>
              </div>

              <div style={{ fontSize: 12, color: 'var(--muted)', fontWeight: 600, marginBottom: 16, textAlign: 'center' }}>
                ⚡ Ton deal sera examiné par notre équipe avant publication.
              </div>

              <div className="field-row">
                <button className="btn-full" style={{ background: 'var(--bg)', border: '1.5px solid var(--border)', fontFamily: 'Nunito', fontSize: 14, fontWeight: 800, cursor: 'pointer', padding: 13, borderRadius: 12, color: 'var(--muted)' }} onClick={() => setStep(2)}>
                  ← Modifier
                </button>
                <button className="btn-full btn-gradient" onClick={submit} disabled={loading}>
                  {loading ? '⏳ Envoi...' : '🔥 Envoyer le deal'}
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
//  DEAL CARD

function DealCard({ deal, user, onVote, onClick }) {
  const pct = deal.prix_normal > 0 ? Math.round((1 - deal.prix_promo / deal.prix_normal) * 100) : null;
  const isHot = deal.score >= 20;

  return (
    <div className="deal-card" onClick={() => onClick(deal)}>
      {/* Score + votes */}
      <div className="deal-score">
        <button className="score-fire-btn" title="🔥 Chaud" onClick={e => { e.stopPropagation(); onVote(deal.id, 'chaud'); }}>🔥</button>
        <div className={`score-num ${deal.score < 0 ? 'cold' : ''}`}>{deal.score}</div>
        <button className="score-ice-btn" title="🧊 Froid" onClick={e => { e.stopPropagation(); onVote(deal.id, 'froid'); }}>🧊</button>
      </div>

      {/* Body */}
      <div className="deal-body">
        <div className="deal-tags">
          <span className="deal-tag tag-cat">{CAT_ICONS[deal.categorie] || '✨'} {deal.categorie}</span>
          <span className="deal-tag tag-type">{deal.type === 'physique' ? '🏪' : '🌐'} {deal.type}</span>
          {isHot && <span className="deal-tag tag-hot">🔥 Chaud</span>}
          {pct >= 30 && <span className="deal-tag tag-new">⚡ -{pct}%</span>}
        </div>

        <div className="deal-title">{deal.titre}</div>

        <div className="deal-price-row">
          <span className="price-promo">{deal.prix_promo} MAD</span>
          {deal.prix_normal > 0 && <span className="price-normal">{deal.prix_normal} MAD</span>}
          {pct > 0 && <span className="price-discount">-{pct}%</span>}
        </div>

        <div className="deal-meta">
          <span>🏪 {deal.magasin}</span>
          <span>📍 {deal.ville}</span>
          {deal.date_fin && <span>⏰ {new Date(deal.date_fin).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' })}</span>}
        </div>
      </div>

      {/* Actions */}
      <div className="deal-actions">
        <span style={{ fontSize: 20 }}>💬</span>
        <span className="deal-comment-count">voir</span>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
//  FICHE DEAL (détail)
// ══════════════════════════════════════════
function DealDetail({ deal, user, onBack, onVote }) {
  const pct = deal.prix_normal > 0 ? Math.round((1 - deal.prix_promo / deal.prix_normal) * 100) : null;
  const [comments, setComments] = useState([]);
  const [newComment, setNewComment] = useState('');
  const [loadingComment, setLoadingComment] = useState(false);

  useEffect(() => {
    sb.from('commentaires').select('*, users(pseudo)').eq('deal_id', deal.id).order('created_at').then(({ data }) => {
      setComments(data || []);
    });
  }, [deal.id]);

  async function addComment() {
    if (!newComment.trim() || !user) return;
    setLoadingComment(true);
    const { error } = await sb.from('commentaires').insert({ deal_id: deal.id, user_id: user.id, contenu: newComment.trim() });
    if (!error) {
      setComments(p => [...p, { id: Date.now(), contenu: newComment.trim(), users: { pseudo: 'toi' }, created_at: new Date().toISOString() }]);
      setNewComment('');
    }
    setLoadingComment(false);
  }

  return (
    <div>
      <div className="deal-detail">
        <div className="deal-detail-header">
          <button className="back-btn" onClick={onBack}>← Retour</button>
          <div className="deal-detail-title">{deal.titre}</div>
        </div>
        <div className="deal-detail-body">
          <div className="deal-tags" style={{ marginBottom: 12 }}>
            <span className="deal-tag tag-cat">{CAT_ICONS[deal.categorie] || '✨'} {deal.categorie}</span>
            <span className="deal-tag tag-type">{deal.type === 'physique' ? '🏪 Physique' : '🌐 En ligne'}</span>
          </div>

          <div className="deal-price-row" style={{ marginBottom: 12 }}>
            <span className="price-promo" style={{ fontSize: 28 }}>{deal.prix_promo} MAD</span>
            {deal.prix_normal > 0 && <span className="price-normal" style={{ fontSize: 16 }}>{deal.prix_normal} MAD</span>}
            {pct > 0 && <span className="price-discount" style={{ fontSize: 13 }}>-{pct}%</span>}
          </div>

          <div className="deal-meta" style={{ marginBottom: 16 }}>
            <span>🏪 {deal.magasin}</span>
            <span>📍 {deal.ville}</span>
            {deal.date_fin && <span>⏰ Valable jusqu'au {new Date(deal.date_fin).toLocaleDateString('fr-FR')}</span>}
          </div>

          {deal.description && (
            <p style={{ fontSize: 14, color: 'var(--muted)', fontWeight: 600, marginBottom: 16, lineHeight: 1.7, borderLeft: '3px solid var(--border)', paddingLeft: 12 }}>
              {deal.description}
            </p>
          )}

          {deal.lien && (
            <a href={deal.lien} target="_blank" rel="noopener noreferrer"
              style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '8px 16px', background: '#e8f4ff', color: 'var(--blue)', borderRadius: 10, fontWeight: 800, fontSize: 13, textDecoration: 'none', marginBottom: 16 }}>
              🔗 Voir le deal en ligne
            </a>
          )}

          {/* Votes */}
          <div className="vote-zone">
            <button className="vote-btn fire" onClick={() => onVote(deal.id, 'chaud')}>🔥 Chaud</button>
            <div className="score-big">{deal.score}</div>
            <button className="vote-btn ice"  onClick={() => onVote(deal.id, 'froid')}>🧊 Froid</button>
          </div>

          {/* Commentaires */}
          <div style={{ borderTop: '1px solid var(--border)', paddingTop: 16, marginTop: 8 }}>
            <div style={{ fontWeight: 900, fontSize: 15, marginBottom: 12 }}>💬 Commentaires ({comments.length})</div>

            {user ? (
              <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
                <input value={newComment} onChange={e => setNewComment(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addComment()}
                  placeholder="Ajoute un commentaire..."
                  style={{ flex: 1, padding: '10px 14px', border: '1.5px solid var(--border)', borderRadius: 10, fontSize: 13, fontFamily: 'Nunito', fontWeight: 600, color: 'var(--text)' }} />
                <button onClick={addComment} disabled={loadingComment}
                  style={{ background: 'var(--rouge)', color: 'white', border: 'none', padding: '10px 16px', borderRadius: 10, fontWeight: 800, fontSize: 13, cursor: 'pointer', fontFamily: 'Nunito' }}>
                  Envoyer
                </button>
              </div>
            ) : (
              <div style={{ fontSize: 13, color: 'var(--muted)', fontWeight: 600, marginBottom: 16, padding: '10px 14px', background: 'var(--bg)', borderRadius: 10 }}>
                🔑 Connecte-toi pour commenter.
              </div>
            )}

            {comments.length === 0 ? (
              <div style={{ fontSize: 13, color: 'var(--muted)', fontWeight: 600 }}>Aucun commentaire — sois le premier ! 🔥</div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {comments.map(c => (
                  <div key={c.id} style={{ display: 'flex', gap: 10 }}>
                    <div className="user-avatar" style={{ width: 32, height: 32, fontSize: 11, flexShrink: 0 }}>
                      {(c.users?.pseudo || '?')[0].toUpperCase()}
                    </div>
                    <div>
                      <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--rouge)', marginBottom: 2 }}>{c.users?.pseudo || 'Anonyme'}</div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>{c.contenu}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
//  ADMIN PANEL
// ══════════════════════════════════════════
function AdminPanel({ onClose }) {
  const [deals, setDeals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [onglet, setOnglet] = useState('en_attente'); // 'en_attente' | 'validé' | 'refusé'

  useEffect(() => { loadDeals(); }, [onglet]);

  async function loadDeals() {
    setLoading(true);
    const { data } = await sb.from('deals').select('*')
      .eq('statut', onglet).order('created_at', { ascending: false });
    setDeals(data || []);
    setLoading(false);
  }

  async function valider(id) {
    await sb.from('deals').update({ statut: 'validé' }).eq('id', id);
    setDeals(p => p.filter(d => d.id !== id));
    toast('✅ Deal validé et publié dans le feed !', 'ok');
  }

  async function refuser(id) {
    await sb.from('deals').update({ statut: 'refusé' }).eq('id', id);
    setDeals(p => p.filter(d => d.id !== id));
    toast('❌ Deal refusé.', 'ok');
  }

  async function supprimer(id) {
    await sb.from('deals').delete().eq('id', id);
    setDeals(p => p.filter(d => d.id !== id));
    toast('🗑️ Deal supprimé.', 'ok');
  }

  const tabStyle = (t) => ({
    padding: '8px 16px', borderRadius: 10, border: 'none', cursor: 'pointer',
    fontFamily: 'Nunito', fontSize: 12, fontWeight: 800,
    background: onglet === t ? 'var(--white)' : 'none',
    color: onglet === t ? (t === 'en_attente' ? 'var(--orange)' : t === 'validé' ? '#0a8c63' : 'var(--rouge)') : 'var(--muted)',
    boxShadow: onglet === t ? '0 1px 4px rgba(0,0,0,0.1)' : 'none',
  });

  return (
    <div className="modal-overlay">
      <div className="modal" style={{ maxWidth: 700, maxHeight: '90vh', display: 'flex', flexDirection: 'column' }}>
        <div className="modal-header" style={{ background: 'var(--dark)' }}>
          <div className="modal-title" style={{ color: 'white' }}>⚙️ Interface Admin</div>
          <button className="modal-close" style={{ background: 'rgba(255,255,255,0.1)', color: 'white' }} onClick={onClose}>✕</button>
        </div>

        {/* Onglets */}
        <div style={{ display: 'flex', background: 'var(--bg)', padding: '8px 16px', gap: 4, borderBottom: '1px solid var(--border)' }}>
          <button style={tabStyle('en_attente')} onClick={() => setOnglet('en_attente')}>⏳ En attente ({onglet === 'en_attente' ? deals.length : '…'})</button>
          <button style={tabStyle('validé')}     onClick={() => setOnglet('validé')}>✅ Validés</button>
          <button style={tabStyle('refusé')}     onClick={() => setOnglet('refusé')}>❌ Refusés</button>
        </div>

        <div className="modal-body" style={{ overflowY: 'auto', flex: 1 }}>
          {loading ? (
            <div className="loader">Chargement...</div>
          ) : deals.length === 0 ? (
            <div className="empty">
              <div className="icon">{onglet === 'en_attente' ? '🎉' : '📭'}</div>
              <div className="msg">{onglet === 'en_attente' ? 'Aucun deal en attente — tout est traité !' : 'Aucun deal dans cette catégorie.'}</div>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {deals.map(d => {
                const pct = d.prix_normal > 0 ? Math.round((1 - d.prix_promo / d.prix_normal) * 100) : null;
                return (
                  <div key={d.id} style={{ background: 'var(--bg)', border: '1.5px solid var(--border)', borderRadius: 14, padding: 16 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 900, fontSize: 15, marginBottom: 6 }}>{d.titre}</div>
                        <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', marginBottom: 8 }}>
                          <span style={{ fontSize: 16, fontWeight: 900, color: 'var(--rouge)' }}>
                            {d.prix_promo} MAD
                            {pct > 0 && <span style={{ fontSize: 10, background: '#e8faf5', color: '#0a8c63', padding: '1px 6px', borderRadius: 20, marginLeft: 6 }}>-{pct}%</span>}
                          </span>
                          {d.prix_normal > 0 && <span style={{ fontSize: 13, color: 'var(--muted)', textDecoration: 'line-through', fontWeight: 700 }}>{d.prix_normal} MAD</span>}
                        </div>
                        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', marginBottom: 6 }}>
                          {[['🏪', d.magasin], ['📦', d.categorie], ['📍', d.ville], ['🌐', d.type],
                            d.date_fin && ['⏰', new Date(d.date_fin).toLocaleDateString('fr-FR')]
                          ].filter(Boolean).map(([icon, val]) => (
                            <span key={val} style={{ fontSize: 11, fontWeight: 700, color: 'var(--muted)' }}>{icon} {val}</span>
                          ))}
                        </div>
                        {d.description && (
                          <p style={{ fontSize: 12, color: 'var(--muted)', fontWeight: 600, lineHeight: 1.6, borderLeft: '3px solid var(--border)', paddingLeft: 10, marginBottom: 6 }}>
                            {d.description}
                          </p>
                        )}
                        {d.lien && (
                          <a href={d.lien} target="_blank" rel="noopener noreferrer"
                            style={{ fontSize: 12, color: 'var(--blue)', fontWeight: 700, display: 'inline-block' }}>
                            🔗 {d.lien}
                          </a>
                        )}
                      </div>

                      {/* Actions selon onglet */}
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, flexShrink: 0 }}>
                        {onglet === 'en_attente' && <>
                          <button onClick={() => valider(d.id)}
                            style={{ background: 'var(--green)', color: 'white', border: 'none', padding: '8px 16px', borderRadius: 10, fontWeight: 900, fontSize: 13, cursor: 'pointer', fontFamily: 'Nunito', whiteSpace: 'nowrap' }}>
                            ✅ Valider
                          </button>
                          <button onClick={() => refuser(d.id)}
                            style={{ background: 'var(--bg)', color: 'var(--rouge)', border: '1.5px solid var(--rouge)', padding: '8px 16px', borderRadius: 10, fontWeight: 900, fontSize: 13, cursor: 'pointer', fontFamily: 'Nunito', whiteSpace: 'nowrap' }}>
                            ✕ Refuser
                          </button>
                        </>}
                        {onglet === 'validé' && <>
                          <button onClick={() => refuser(d.id)}
                            style={{ background: 'var(--bg)', color: 'var(--rouge)', border: '1.5px solid var(--rouge)', padding: '8px 16px', borderRadius: 10, fontWeight: 900, fontSize: 13, cursor: 'pointer', fontFamily: 'Nunito', whiteSpace: 'nowrap' }}>
                            ✕ Retirer
                          </button>
                          <button onClick={() => supprimer(d.id)}
                            style={{ background: 'none', color: 'var(--muted)', border: '1px solid var(--border)', padding: '8px 16px', borderRadius: 10, fontWeight: 700, fontSize: 12, cursor: 'pointer', fontFamily: 'Nunito', whiteSpace: 'nowrap' }}>
                            🗑 Supprimer
                          </button>
                        </>}
                        {onglet === 'refusé' && <>
                          <button onClick={() => valider(d.id)}
                            style={{ background: 'var(--green)', color: 'white', border: 'none', padding: '8px 16px', borderRadius: 10, fontWeight: 900, fontSize: 13, cursor: 'pointer', fontFamily: 'Nunito', whiteSpace: 'nowrap' }}>
                            ✅ Republier
                          </button>
                          <button onClick={() => supprimer(d.id)}
                            style={{ background: 'none', color: 'var(--muted)', border: '1px solid var(--border)', padding: '8px 16px', borderRadius: 10, fontWeight: 700, fontSize: 12, cursor: 'pointer', fontFamily: 'Nunito', whiteSpace: 'nowrap' }}>
                            🗑 Supprimer
                          </button>
                        </>}
                      </div>
                    </div>
                    <div style={{ marginTop: 8, fontSize: 10, color: 'var(--muted)', fontWeight: 700 }}>
                      Soumis le {new Date(d.created_at).toLocaleDateString('fr-FR')} à {new Date(d.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
//  APP PRINCIPALE
// ══════════════════════════════════════════
function App() {
  const [user, setUser]           = useState(null);
  const [userProfile, setProfile] = useState(null);
  const [deals, setDeals]         = useState([]);
  const [loading, setLoading]     = useState(true);
  const [modal, setModal]         = useState(null); // null | 'auth' | 'submit'
  const [authTab, setAuthTab]     = useState('login');
  const [selectedDeal, setDeal]   = useState(null);
  const [filterCat, setFilterCat] = useState('Tout');
  const [filterVille, setFilterVille] = useState('');
  const [filterSort, setFilterSort]   = useState('score');
  const [showAdmin, setShowAdmin]   = useState(false);
  const [showProfileMenu, setProfileMenu] = useState(false);
  const profileRef = useRef(null);

  // Ferme le menu profil si clic ailleurs
  useEffect(() => {
    const handler = (e) => { if (profileRef.current && !profileRef.current.contains(e.target)) setProfileMenu(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  // Auth init
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      if (session?.user) loadProfile(session.user.id);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      setUser(session?.user ?? null);
      if (session?.user) loadProfile(session.user.id);
      else setProfile(null);
    });
    return () => subscription.unsubscribe();
  }, []);

  async function loadProfile(uid) {
    const { data } = await sb.from('users').select('*').eq('id', uid).maybeSingle();
    setProfile(data);
  }

  // Charger les deals
  useEffect(() => {
    loadDeals();
  }, [filterCat, filterVille, filterSort]);

  async function loadDeals() {
    setLoading(true);
    let q = sb.from('deals').select('*').eq('statut', 'validé');
    if (filterCat !== 'Tout') q = q.eq('categorie', filterCat);
    if (filterVille) q = q.eq('ville', filterVille);
    if (filterSort === 'score')  q = q.order('score', { ascending: false });
    if (filterSort === 'recent') q = q.order('created_at', { ascending: false });
    const { data } = await q;
    setDeals(data || []);
    setLoading(false);
  }

async function handleVote(dealId, type) {
  if (!user) { setAuthTab('login'); setModal('auth'); return; }

  const { data: existing } = await sb.from('votes').select('*').eq('deal_id', dealId).eq('user_id', user.id).maybeSingle();

  let scoreDelta = 0;

  if (existing) {
    if (existing.type === type) {
      await sb.from('votes').delete().eq('id', existing.id);
      scoreDelta = type === 'chaud' ? -1 : 1;
      toast('Vote retiré.', 'ok');
    } else {
      await sb.from('votes').update({ type }).eq('id', existing.id);
      scoreDelta = type === 'chaud' ? 2 : -2;
      toast(type === 'chaud' ? '🔥 Chaud !' : '🧊 Froid.', 'ok');
    }
  } else {
    await sb.from('votes').insert({ deal_id: dealId, user_id: user.id, type });
    scoreDelta = type === 'chaud' ? 1 : -1;
    toast(type === 'chaud' ? '🔥 Chaud !' : '🧊 Froid.', 'ok');
  }

  // Mise à jour immédiate dans l'interface
  setDeals(prev => prev.map(d =>
    d.id === dealId ? { ...d, score: d.score + scoreDelta } : d
  ));

  // Si on est sur la fiche détail, on met aussi à jour
  if (selectedDeal?.id === dealId) {
    setDeal(prev => ({ ...prev, score: prev.score + scoreDelta }));
  }
}

  async function logout() {
    await sb.auth.signOut();
    setProfileMenu(false);
    toast('Déconnecté. À bientôt !', 'ok');
  }

  return (
    <>
      <ToastContainer />

      {/* TOPBAR */}
      <div className="topbar">
        <div className="logo-pill" onClick={() => { setDeal(null); }}>
          <span style={{ fontSize: 18 }}>🔥</span>
          <span className="logo-ar">فيدوستافيد</span>
          <span className="logo-lat">fidwastafid</span>
        </div>

        <div className="topbar-right">
          {user ? (
            <>
              {user.email === ADMIN_EMAIL && (
                <button className="btn-nav" style={{ background: '#fff8e0', color: '#cc8800' }}
                  onClick={() => setShowAdmin(true)}>
                  ⚙️ Admin
                </button>
              )}
              <button className="btn-nav btn-submit-nav" onClick={() => setModal('submit')}>
                + Soumettre un deal
              </button>
              <div style={{ position: 'relative' }} ref={profileRef}>
                <div className="user-pill" onClick={() => setProfileMenu(p => !p)}>
                  <div className="user-avatar">
                    {(userProfile?.pseudo || user.email)[0].toUpperCase()}
                  </div>
                  <span className="user-pseudo">{userProfile?.pseudo || 'Mon compte'}</span>
                  <span style={{ fontSize: 10, color: 'var(--muted)' }}>▾</span>
                </div>
                {showProfileMenu && (
                  <div className="profile-menu">
                    <div className="profile-menu-header">
                      <div className="profile-menu-pseudo">{userProfile?.pseudo || 'Mon profil'}</div>
                      <div className="profile-menu-email">{user.email}</div>
                    </div>
                    <button className="profile-menu-item">👤 Mon profil</button>
                    <button className="profile-menu-item">📋 Mes deals soumis</button>
                    <button className="profile-menu-item danger" onClick={logout}>🚪 Déconnexion</button>
                  </div>
                )}
              </div>
            </>
          ) : (
            <>
              <button className="btn-nav btn-login" onClick={() => { setAuthTab('login'); setModal('auth'); }}>Connexion</button>
              <button className="btn-nav btn-signup" onClick={() => { setAuthTab('signup'); setModal('auth'); }}>S'inscrire</button>
            </>
          )}
        </div>
      </div>

      {/* LAYOUT */}
      <div className="layout">
        {/* SIDEBAR */}
        <nav className="sidebar">
          <div className="sidebar-brand">
            <span className="ar">فيدوستافيد</span>
            <div className="sub">Bons plans marocains 🇲🇦</div>
          </div>

          <div className="sidebar-section">Trier par</div>
          <button className={`sidebar-btn ${filterSort === 'score' ? 'active' : ''}`} onClick={() => setFilterSort('score')}>🔥 Les plus chauds</button>
          <button className={`sidebar-btn ${filterSort === 'recent' ? 'active' : ''}`} onClick={() => setFilterSort('recent')}>⚡ Les plus récents</button>

          <div className="sidebar-section" style={{ marginTop: 12 }}>Catégories</div>
          <div className="sidebar-cats">
            {['Tout', ...CATEGORIES].map(cat => (
              <button key={cat} className={`cat-btn ${filterCat === cat ? 'active' : ''}`} onClick={() => setFilterCat(cat)}>
                {cat === 'Tout' ? '🔥 Tous les deals' : `${CAT_ICONS[cat] || '✨'} ${cat}`}
              </button>
            ))}
          </div>

          <div className="sidebar-cta" onClick={() => user ? setModal('submit') : (setAuthTab('signup'), setModal('auth'))}>
            <span className="ar">فيد و ستافيد</span>
            <span className="sub">Partage un bon plan →</span>
          </div>
        </nav>

        {/* MAIN */}
        <main className="main">
          {selectedDeal ? (
            <DealDetail
              deal={selectedDeal}
              user={user}
              onBack={() => setDeal(null)}
              onVote={handleVote}
            />
          ) : (
            <>
              {/* Filtres */}
              <div className="filters-bar">
                <span style={{ fontWeight: 900, fontSize: 13 }}>🔥 Bons plans</span>
                <div className="filter-wrap">
                  <select className="filter-select" value={filterVille} onChange={e => setFilterVille(e.target.value)}>
                    <option value="">📍 Toutes les villes</option>
                    {VILLES.slice(1).map(v => <option key={v} value={v}>📍 {v}</option>)}
                  </select>
                </div>
                <button className={`filter-pill ${filterCat === 'Tout' ? 'active' : ''}`} onClick={() => setFilterCat('Tout')}>Tous</button>
                {CATEGORIES.slice(0, 4).map(c => (
                  <button key={c} className={`filter-pill ${filterCat === c ? 'active' : ''}`} onClick={() => setFilterCat(c)}>
                    {CAT_ICONS[c]} {c}
                  </button>
                ))}
              </div>

              {/* Feed */}
              {loading ? (
                <div className="loader">⏳ Chargement des deals...</div>
              ) : deals.length === 0 ? (
                <div className="empty">
                  <div className="icon">🔍</div>
                  <div className="msg">Aucun deal trouvé pour ces filtres.</div>
                </div>
              ) : (
                <div className="feed-grid">
                  {deals.map(d => (
                    <DealCard key={d.id} deal={d} user={user} onVote={handleVote} onClick={setDeal} />
                  ))}
                </div>
              )}
            </>
          )}
        </main>
      </div>

      {/* MODALS */}
      {modal === 'auth' && (
        <AuthModal
          defaultTab={authTab}
          onClose={() => setModal(null)}
          onSuccess={(u) => { setUser(u); setModal(null); }}
        />
      )}

      {modal === 'submit' && (
        <SubmitDealModal
          user={user}
          onClose={() => setModal(null)}
          onSuccess={() => { loadDeals(); toast('🔥 Deal soumis ! Merci.', 'ok'); }}
        />
      )}

      {showAdmin && <AdminPanel onClose={() => setShowAdmin(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
