<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فيدوستافيد — Fidwastafid</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --rouge:  #f03e3e;
    --rouge2: #ff6b6b;
    --orange: #ff922b;
    --yellow: #ffd43b;
    --green:  #20c997;
    --blue:   #339af0;
    --bg:     #f8f6f2;
    --white:  #ffffff;
    --text:   #1a1a1a;
    --muted:  #888888;
    --border: #e8e4de;
    --dark:   #1e1e1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .logo-pill {
    background: none;
    border-radius: 0;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    text-decoration: none;
  }

  .logo-seal {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    cursor: pointer;
  }

  .logo-seal-sidebar {
    width: 80px;
    height: 80px;
    display: block;
    margin: 0 auto 8px;
  }

  .logo-ar  { font-family: 'Scheherazade New', serif; font-size: 20px; font-weight: 700; color: white; line-height: 1; }
  .logo-lat { font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.7); }

  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .btn-nav {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 800;
    padding: 7px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-login  { background: var(--bg); color: var(--muted); }
  .btn-login:hover { background: var(--border); color: var(--text); }
  .btn-signup { background: var(--rouge); color: white; }
  .btn-signup:hover { background: #d63030; }
  .btn-submit-nav { background: linear-gradient(135deg, var(--rouge), var(--orange)); color: white; }
  .btn-submit-nav:hover { opacity: 0.9; }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px 5px 6px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .user-pill:hover { border-color: var(--rouge2); }
  .user-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rouge), var(--orange));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    color: white;
  }
  .user-pseudo { font-size: 12px; font-weight: 800; color: var(--text); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }

  .sidebar-brand {
    padding: 4px 16px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    text-align: center;
  }
  .sidebar-brand .ar { font-family: 'Scheherazade New', serif; font-size: 26px; font-weight: 700; color: var(--rouge); display: block; }
  .sidebar-brand .sub { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 2px; }

  .sidebar-section { padding: 8px 16px 4px; font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #ccc; }

  .sidebar-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    background: none;
    border: none;
    border-left: 3px solid transparent;
    width: 100%;
    text-align: left;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.12s;
  }
  .sidebar-btn:hover { background: var(--bg); color: var(--text); }
  .sidebar-btn.active { color: var(--rouge); background: #fff5f5; border-left-color: var(--rouge); }

  .sidebar-cats { padding: 8px 16px; display: flex; flex-direction: column; gap: 2px; }
  .cat-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    text-align: left;
    transition: all 0.1s;
  }
  .cat-btn:hover, .cat-btn.active { background: #fff0f0; color: var(--rouge); }

  .sidebar-cta {
    margin: 16px 12px 0;
    background: linear-gradient(135deg, var(--rouge), var(--orange));
    border-radius: 14px;
    padding: 14px;
    color: white;
    text-align: center;
    cursor: pointer;
  }
  .sidebar-cta .ar { font-family: 'Scheherazade New', serif; font-size: 20px; font-weight: 700; display: block; }
  .sidebar-cta .sub { font-size: 10px; opacity: 0.8; margin-top: 2px; }

  /* ── MAIN ── */
  .main { padding: 24px 28px 80px; }

  /* ── HERO ── */
  .hero-band {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .hero-band::after {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,62,62,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-top { margin-bottom: 22px; }

  .hero-tagline-fr {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 6px;
  }
  .hero-tagline-fr span { color: var(--rouge); }

  /* ── TICKER ── */
  .ticker-bar {
    background: var(--dark);
    overflow: hidden;
    height: 34px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .ticker-track {
    display: flex;
    align-items: center;
    gap: 0;
    animation: tickerScroll 22s linear infinite;
    white-space: nowrap;
    will-change: transform;
  }

  .ticker-track:hover { animation-play-state: paused; }

  @keyframes tickerScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 32px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.65);
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .ticker-item .num {
    background: var(--rouge);
    color: white;
    width: 18px; height: 18px;
    border-radius: 5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .ticker-item .ar {
    font-family: 'Scheherazade New', serif;
    font-size: 13px;
    color: var(--orange);
    font-weight: 700;
  }

  /* ── ILLUS COMMUNAUTÉ ── */
  .hero-illus {
    margin: 4px 0 20px;
    border-radius: 14px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    background: linear-gradient(135deg, #fff5f2 0%, #fff8f0 50%, #f5f5ff 100%);
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  @media (max-width: 768px) {
    .ticker-bar { height: 30px; }
    .ticker-item { padding: 0 20px; font-size: 11px; }
    .hero-illus { height: 70px; }
  }
  @keyframes heroFadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes heroCursorBlink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .hero-fr-anim {
    animation: heroFadeUp 0.5s ease both;
  }

  .hero-ar-anim {
    animation: heroFadeUp 0.5s ease 0.3s both;
  }

  .hero-steps-anim {
    animation: heroFadeUp 0.5s ease 0.15s both;
  }

  .hero-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--rouge);
    margin-left: 2px;
    vertical-align: middle;
    animation: heroCursorBlink 0.7s ease infinite;
    border-radius: 1px;
  }

  .hero-tagline-ar {
    font-family: 'Scheherazade New', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--muted);
    direction: rtl;
    display: block;
    line-height: 1.4;
  }

  .hero-steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .hero-step {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .hero-step:hover { border-color: var(--rouge2); box-shadow: 0 4px 14px rgba(240,62,62,0.07); }

  .hero-step-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

  .hero-step-num {
    background: var(--rouge);
    color: white;
    width: 26px; height: 26px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; flex-shrink: 0;
  }

  .hero-step-emoji { font-size: 18px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; }

  .hero-step-title { font-size: 13px; font-weight: 900; color: var(--text); }

  .hero-step-title-ar {
    font-family: 'Scheherazade New', serif;
    font-size: 16px; color: var(--rouge); font-weight: 700;
    direction: rtl; text-align: left; display: block; margin-bottom: 0; line-height: 1.2;
  }

  .hero-step-desc { font-size: 12px; color: var(--muted); font-weight: 600; line-height: 1.65; }

  /* ── DEAL CARD ── */
  .feed-grid { display: flex; flex-direction: column; gap: 10px; }

  /* ── FEED + DEAL CARD — Layout Dealabs ── */
  .feed-grid { display: flex; flex-direction: column; gap: 8px; }

  .deal-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: row;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .deal-card:hover { border-color: var(--rouge2); box-shadow: 0 4px 16px rgba(240,62,62,0.08); }

  .dc-img {
    width: 140px; min-width: 140px;
    background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .dc-img img { width: 100%; height: 140px; object-fit: contain; }
  .dc-img-placeholder { font-size: 36px; opacity: 0.2; }

  .dc-body { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 5px; min-width: 0; }

  .dc-top { display: flex; align-items: center; justify-content: space-between; }

  .dc-score {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .dc-vote-btn {
    display: flex; align-items: center; justify-content: center;
    padding: 5px 10px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--white); cursor: pointer; font-family: 'Scheherazade New', serif;
    font-size: 13px; font-weight: 700; transition: all 0.15s; line-height: 1;
    white-space: nowrap;
  }
  .dc-vote-btn.rabah { color: #0a8c63; }
  .dc-vote-btn.rabah:hover { border-color: #0a8c63; background: #e8faf5; }
  .dc-vote-btn.khssara { color: var(--rouge); }
  .dc-vote-btn.khssara:hover { border-color: var(--rouge); background: #fff0f0; }
  .dc-score-num { font-size: 15px; font-weight: 900; color: var(--rouge); min-width: 28px; text-align: center; }
  .dc-score-num.cold { color: var(--blue); }
  .dc-date { font-size: 11px; color: var(--muted); font-weight: 600; }

  .dc-title {
    font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .dc-price-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .dc-price-promo { font-size: 22px; font-weight: 900; color: var(--rouge); }
  .dc-price-normal { font-size: 13px; font-weight: 700; color: var(--muted); text-decoration: line-through; }
  .dc-price-pct { font-size: 11px; font-weight: 800; background: var(--rouge); color: white; padding: 2px 7px; border-radius: 5px; }

  .dc-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .dc-meta span { font-size: 11px; font-weight: 700; color: var(--muted); }
  .dc-meta .dc-shop { font-weight: 800; color: var(--text); }

  .dc-desc {
    font-size: 12px; color: var(--muted); font-weight: 600; line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    margin-top: 2px; padding-top: 4px; border-top: 1px solid var(--border);
  }

  .dc-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .dc-action-btn {
    display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700;
    color: var(--muted); background: none; border: none; cursor: pointer;
    font-family: 'Nunito', sans-serif; padding: 4px 6px; border-radius: 6px; transition: all 0.1s;
  }
  .dc-action-btn:hover { background: var(--bg); color: var(--text); }

  .dc-voir-btn {
    background: var(--blue); color: white; border: none; padding: 7px 16px;
    border-radius: 8px; font-size: 13px; font-weight: 800; cursor: pointer;
    font-family: 'Scheherazade New', serif; direction: rtl;
    display: flex; align-items: center; gap: 5px;
    text-decoration: none; transition: opacity 0.15s; white-space: nowrap;
  }
  .dc-voir-btn:hover { opacity: 0.88; }

  /* Styles conservés pour fiche détail */
  .deal-tag { font-size: 9px; font-weight: 800; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
  .tag-cat  { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .tag-type { background: #fff0f0; color: var(--rouge); }
  .tag-new  { background: var(--yellow); color: #7a5c00; }
  .tag-hot  { background: linear-gradient(135deg, #ff4d4d, #ff8c00); color: white; }
  .deal-title { font-size: 15px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
  .deal-price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .price-promo    { font-size: 20px; font-weight: 900; color: var(--rouge); }
  .price-normal   { font-size: 13px; font-weight: 700; color: var(--muted); text-decoration: line-through; }
  .price-discount { font-size: 11px; font-weight: 800; background: #e8faf5; color: #0a8c63; padding: 2px 7px; border-radius: 20px; }
  .deal-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .deal-meta span { font-size: 11px; font-weight: 700; color: var(--muted); display: flex; align-items: center; gap: 3px; }

  /* ── FILTRES ── */
  .filters-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.12s;
  }
  .filter-pill:hover, .filter-pill.active { border-color: var(--rouge); color: var(--rouge); background: #fff5f5; }

  .filter-select {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    appearance: none;
    padding-right: 28px;
  }

  .filter-wrap { position: relative; }
  .filter-wrap::after { content: '▾'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 20px;
    backdrop-filter: blur(2px);
    overflow: hidden;
  }

  .modal {
    background: var(--white);
    border-radius: 20px;
    width: 100%;
    max-width: 440px;
    max-height: calc(100dvh - 40px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: modalIn 0.2s ease;
  }

  .modal-body {
    padding: 24px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    flex: 1;
    min-height: 0;
  }

  @media (max-width: 768px) {
    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal {
      border-radius: 20px 20px 0 0;
      max-height: 92dvh;
      max-width: 100%;
    }
  }

  @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .modal-title { font-size: 18px; font-weight: 900; color: var(--text); }
  .modal-title .ar { font-family: 'Scheherazade New', serif; color: var(--rouge); }

  .modal-close {
    background: var(--bg);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: all 0.12s;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }
    display: flex;
    background: var(--bg);
    border-radius: 12px;
    padding: 3px;
    margin-bottom: 20px;
    gap: 2px;
  }

  .modal-tab {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: none;
    background: none;
    font-size: 13px;
    font-weight: 800;

let _addToast = null;

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  _addToast = useCallback((msg, type = 'ok') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000);
  }, []);
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════
//  MODAL AUTH (Connexion / Inscription)
// ══════════════════════════════════════════
function AuthModal({ onClose, onSuccess, defaultTab = 'login' }) {
  const [tab, setTab]         = useState(defaultTab); // 'login' | 'signup'
  const [email, setEmail]     = useState('');
  const [password, setPass]   = useState('');
  const [pseudo, setPseudo]   = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const [done, setDone]       = useState(false);

  const reset = () => { setEmail(''); setPass(''); setPseudo(''); setError(''); setDone(false); setLoading(false); };

  const handleTab = (t) => { reset(); setTab(t); };

  // ── CONNEXION ──
  async function handleLogin() {
    if (!email || !password) return setError('Remplis tous les champs.');
    setLoading(true); setError('');
    const { data, error: err } = await sb.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (err) return setError('Email ou mot de passe incorrect.');
    toast('👋 Marhba ! Connecté avec succès.', 'ok');
    onSuccess(data.user);
  }

  // ── INSCRIPTION ──
  async function handleSignup() {
    if (!email || !password || !pseudo) return setError('Remplis tous les champs.');
    if (password.length < 6) return setError('Le mot de passe doit faire au moins 6 caractères.');
    if (pseudo.length < 3)   return setError('Le pseudo doit faire au moins 3 caractères.');
    setLoading(true); setError('');

    // Vérifie si le pseudo est dispo
    const { data: existing } = await sb.from('users').select('id').eq('pseudo', pseudo).maybeSingle();
    if (existing) { setLoading(false); return setError('Ce pseudo est déjà pris.'); }

    const { data, error: err } = await sb.auth.signUp({ email, password });
    if (err) { setLoading(false); return setError(err.message); }

    // Créer le profil dans la table users
    if (data.user) {
      await sb.from('users').insert({ id: data.user.id, pseudo });
    }

    setLoading(false);
    setDone(true);
  }

  return (
    <div className="modal-overlay" onClick={null}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">
            {tab === 'login' ? 'Connexion' : 'Rejoins'} <span className="ar">فيدوستافيد</span>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="modal-tabs">
            <button className={`modal-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => handleTab('login')}>Se connecter</button>
            <button className={`modal-tab ${tab === 'signup' ? 'active' : ''}`} onClick={() => handleTab('signup')}>S'inscrire</button>
          </div>

          {done ? (
            <div className="success-banner">
              <span className="big">📬</span>
              <strong>Vérifie tes emails !</strong>
              <span>Un lien de confirmation a été envoyé à <strong>{email}</strong>. Clique dessus pour activer ton compte.</span>
            </div>
          ) : (
            <>
              {error && <div className="error-banner">⚠️ {error}</div>}

              {tab === 'signup' && (
                <div className="field">
                  <label>Pseudo *</label>
                  <input value={pseudo} onChange={e => setPseudo(e.target.value)}
                    placeholder="ex: casawi_deals" onKeyDown={e => e.key === 'Enter' && handleSignup()} />
                </div>
              )}

              <div className="field">
                <label>Email *</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                  placeholder="ton@email.com" onKeyDown={e => e.key === 'Enter' && (tab === 'login' ? handleLogin() : handleSignup())} />
              </div>

              <div className="field">
                <label>Mot de passe *</label>
                <input type="password" value={password} onChange={e => setPass(e.target.value)}
                  placeholder="••••••••" onKeyDown={e => e.key === 'Enter' && (tab === 'login' ? handleLogin() : handleSignup())} />
              </div>

              <button
                className="btn-full btn-rouge"
                onClick={tab === 'login' ? handleLogin : handleSignup}
                disabled={loading}
              >
                {loading ? '⏳ Chargement...' : tab === 'login' ? '🔑 Se connecter' : '🚀 Créer mon compte'}
              </button>

              <div className="auth-switch">
                {tab === 'login'
                  ? <>Pas encore de compte ? <button onClick={() => handleTab('signup')}>S'inscrire</button></>
                  : <>Déjà un compte ? <button onClick={() => handleTab('login')}>Se connecter</button></>
                }
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

  }

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  // ── Auto-fetch og:image quand le lien change ──
  async function handleLienChange(url) {
    set('lien', url);
    set('photo_url', '');
    setImgError(false);
    if (!url || !url.startsWith('http')) return;
    setFetchingImg(true);
    try {
      const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const res = await fetch(proxy);
      const data = await res.json();
      const html = data.contents || '';
      // Cherche og:image en priorité, puis twitter:image
      const ogMatch = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
                   || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i)
                   || html.match(/<meta[^>]+name=["']twitter:image["'][^>]+content=["']([^"']+)["']/i);
      if (ogMatch && ogMatch[1]) {
        set('photo_url', ogMatch[1]);
      } else {
        setImgError(true);
      }
    } catch {
      setImgError(true);
    }
    setFetchingImg(false);
  }

  const discount = () => {
    const p = parseFloat(form.prix_promo), n = parseFloat(form.prix_normal);
    if (p && n && n > p) return Math.round((1 - p / n) * 100);
    return null;
  };

  function nextStep() {
    setError('');
    if (step === 1) {
      if (!form.titre.trim()) return setError('Donne un titre au deal.');
      if (!form.magasin.trim()) return setError('Indique le magasin ou site.');
      if (!form.prix_promo) return setError('Indique le prix promo.');
    }
    setStep(s => s + 1);
  }

  async function submit() {
    setLoading(true); setError('');
    const payload = {
      titre:             form.titre.trim(),
      magasin:           form.magasin.trim(),
      categorie:         form.categorie,
      ville:             form.ville,
      type:              form.type,
      prix_promo:        parseFloat(form.prix_promo),
      prix_normal:       parseFloat(form.prix_normal) || 0,
      description:       form.description.trim() || null,
      lien:              form.lien.trim() || null,
      photo_url:         form.photo_url || null,
      date_fin:          form.date_fin || null,
      whatsapp_contact:  form.whatsapp_contact.trim() || null,
      user_id:           user.id,
      statut:            'en_attente',
      score:             0
    };

    const { error: err } = await sb.from('deals').insert(payload);
    setLoading(false);
    if (err) return setError('Erreur : ' + err.message);
    setDone(true);
  }

  if (done) return (
    <div className="modal-overlay" onClick={null}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Deal soumis ! 🎉</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="success-banner">
            <span className="big">🔥</span>
            <strong>Shukran ! Ton deal est en cours de vérification.</strong>
            <span>Il sera publié dans le feed si notre équipe valide les infos. Tu seras notifié.</span>
          </div>
          <br />
          <button className="btn-full btn-gradient" onClick={() => { setDone(false); setStep(1); setForm({ titre:'', magasin:'', categorie:'Alimentaire', ville:'National', type:'physique', prix_promo:'', prix_normal:'', description:'', lien:'', date_fin:'', photo_url:'' }); onSuccess?.(); onClose(); }}>
            Retour au feed
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={null}>
      <div className="modal" style={{ maxWidth: 500 }}>
        <div className="modal-header">
          <div className="modal-title">🔥 Soumettre un deal</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">

          {/* Indicateur d'étape */}
          <div className="steps-indicator">
            {[1,2,3].map((s, i) => (
              <React.Fragment key={s}>
                {i > 0 && <div className={`step-line ${step > i ? 'done' : ''}`}/>}
                <div className={`step-dot ${step > s ? 'done' : step === s ? 'active' : ''}`}>
                  {step > s ? '✓' : s}
                </div>
              </React.Fragment>
            ))}
          </div>
          <div className="step-labels">
            {['Infos de base', 'Détails', 'Confirmation'].map((l, i) => (
              <span key={l} className={`step-label ${step === i+1 ? 'active' : ''}`}>{l}</span>
            ))}
          </div>

          {error && <div className="error-banner">⚠️ {error}</div>}

          {/* ── ÉTAPE 1 : Infos de base ── */}
          {step === 1 && (
            <>
              <div className="field">
                <label>Titre du deal *</label>
                <input value={form.titre} onChange={e => set('titre', e.target.value)}
                  placeholder="ex: Huile Cristal 5L en promo chez Marjane" />
              </div>

              <div className="field-row">
                <div className="field">
                  <label>Magasin / Site *</label>
                  <input value={form.magasin} onChange={e => set('magasin', e.target.value)}
                    placeholder="ex: Marjane, Jumia..." />
                </div>
                <div className="field">
                  <label>Catégorie</label>
                  <select value={form.categorie} onChange={e => set('categorie', e.target.value)}>
                    {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                  </select>
                </div>
              </div>

              <div className="field">
                <label>Prix promo (MAD) *</label>
                <div className="price-input-wrap">
                  <input type="number" min="0" step="0.5" value={form.prix_promo}
                    onChange={e => set('prix_promo', e.target.value)} placeholder="89" />
                  <span className="price-unit">MAD</span>
                </div>
              </div>

              <div className="field">
                <label>Prix normal (MAD)</label>
                <div className="price-input-wrap">
                  <input type="number" min="0" step="0.5" value={form.prix_normal}
                    onChange={e => set('prix_normal', e.target.value)} placeholder="115" />
                  <span className="price-unit">MAD</span>
                </div>
                {discount() && (
                  <div className="discount-preview">✅ Réduction de -{discount()}% calculée automatiquement</div>
                )}
              </div>

              <button className="btn-full btn-rouge" onClick={nextStep}>Suivant →</button>
            </>
          )}

          {/* ── ÉTAPE 2 : Détails ── */}
          {step === 2 && (
            <>
              <div className="field-row">
                <div className="field">
                  <label>Ville</label>
                  <select value={form.ville} onChange={e => set('ville', e.target.value)}>
                    {VILLES.map(v => <option key={v}>{v}</option>)}
                  </select>
                </div>
                <div className="field">
                  <label>Type de deal</label>
                  <select value={form.type} onChange={e => set('type', e.target.value)}>
                    <option value="physique">🏪 Physique (magasin)</option>
                    <option value="online">🌐 En ligne</option>
                    <option value="les deux">↔️ Les deux</option>
                  </select>
                </div>
              </div>

              <div className="field">
                <label>Valable jusqu'au</label>
                <input type="date" value={form.date_fin} onChange={e => set('date_fin', e.target.value)} />
              </div>

              <div className="field">
                <label>Lien du deal <span style={{ fontWeight: 600, color: 'var(--muted)', fontSize: 11 }}>(si en ligne)</span></label>
                <input type="url" value={form.lien}
                  onChange={e => handleLienChange(e.target.value)}
                  placeholder="https://jumia.ma/..." />
                {fetchingImg && (
                  <div style={{ marginTop: 6, fontSize: 12, color: 'var(--muted)', fontWeight: 700 }}>⏳ Récupération de l'image...</div>
                )}
              </div>

              {/* ── PHOTO ── */}
              <div className="field">
                <label>Photo du produit</label>
                {form.photo_url ? (
                  /* Image présente — aperçu avec bouton supprimer */
                  <div style={{ position: 'relative', border: '1.5px solid var(--border)', borderRadius: 12, overflow: 'hidden', background: 'var(--bg)' }}>
                    <img src={form.photo_url} alt="Aperçu"
                      style={{ width: '100%', maxHeight: 200, objectFit: 'contain', display: 'block', padding: 8 }}
                      onError={() => { set('photo_url', ''); setImgError(true); }}
                    />
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 12px', background: 'white', borderTop: '1px solid var(--border)' }}>
                      <span style={{ fontSize: 11, color: '#0a8c63', fontWeight: 700 }}>✅ Photo ajoutée</span>
                      <button onClick={() => { set('photo_url', ''); setImgError(false); }}
                        style={{ fontSize: 11, fontWeight: 800, color: 'var(--rouge)', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'Nunito' }}>
                        ✕ Supprimer
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{ border: '1.5px dashed var(--border)', borderRadius: 12, padding: 20, background: 'var(--bg)' }}>
                    {uploading ? (
                      <div style={{ textAlign: 'center', fontSize: 13, fontWeight: 700, color: 'var(--muted)' }}>
                        ⏳ Compression et envoi en cours...
                      </div>
                    ) : (
                      <>
                        <label style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
                          <input type="file" accept="image/*" style={{ display: 'none' }}
                            onChange={e => e.target.files[0] && handlePhotoUpload(e.target.files[0])} />
                          <div style={{ fontSize: 32 }}>📷</div>
                          <div style={{ fontSize: 13, fontWeight: 800, color: 'var(--blue)' }}>Choisir une photo depuis mon appareil</div>
                          <div style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 600 }}>JPG · PNG · WEBP — compressée automatiquement</div>
                        </label>
                        <div style={{ margin: '12px 0', display: 'flex', alignItems: 'center', gap: 8 }}>
                          <div style={{ flex: 1, height: 1, background: 'var(--border)' }}/>
                          <span style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 700 }}>ou colle une URL</span>
                          <div style={{ flex: 1, height: 1, background: 'var(--border)' }}/>
                        </div>
                        <input type="url" value={imgError ? form.photo_url : ''}
                          onChange={e => { set('photo_url', e.target.value); setImgError(true); }}
                          placeholder="https://...image-du-produit.jpg"
                          style={{ width: '100%', padding: '9px 12px', border: '1.5px solid var(--border)', borderRadius: 8, fontSize: 13, fontFamily: 'Nunito', fontWeight: 600, background: 'white', color: 'var(--text)', boxSizing: 'border-box' }}
                        />
                      </>
                    )}
                  </div>
                )}
              </div>

              <div className="field">
                <label>Description <span style={{ fontWeight: 600, color: 'var(--muted)', fontSize: 11 }}>(conditions, stock, où trouver...)</span></label>
                <textarea value={form.description} onChange={e => set('description', e.target.value)}
                  placeholder="Ex : Valable uniquement en magasin Marjane Casablanca, stocks limités, présenter ce deal à la caisse..." />
              </div>

              {/* ── WHATSAPP CONTACT ── */}
              <div className="field">
                <label style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span style={{ fontSize: 16 }}>💬</span>
                  Contact WhatsApp
                  <span style={{ fontWeight: 600, color: 'var(--muted)', fontSize: 11 }}>(optionnel)</span>
                </label>
                <div style={{ background: '#e8faf0', border: '1.5px solid #25D366', borderRadius: 10, padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <div style={{ fontSize: 11, color: '#0a6e3a', fontWeight: 700, lineHeight: 1.5 }}>
                    Permets aux intéressés de te contacter directement sur WhatsApp pour plus d'infos sur ce deal.
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ fontSize: 13, fontWeight: 800, color: '#0a6e3a', flexShrink: 0 }}>+212</span>
                    <input
                      type="tel"
                      value={form.whatsapp_contact}
                      onChange={e => set('whatsapp_contact', e.target.value.replace(/[^0-9]/g, ''))}
                      placeholder="6XXXXXXXX"
                      maxLength={9}
                      style={{ flex: 1, padding: '9px 12px', border: '1.5px solid #25D366', borderRadius: 8, fontSize: 14, fontFamily: 'Nunito', fontWeight: 700, background: 'white', color: 'var(--text)', letterSpacing: 1 }}
                    />
                  </div>
                  {form.whatsapp_contact.length >= 9 && (
                    <div style={{ fontSize: 11, color: '#0a6e3a', fontWeight: 700 }}>
                      ✅ Lien généré : wa.me/212{form.whatsapp_contact}
                    </div>
                  )}
                </div>
              </div>

              <div className="field-row">
                <button className="btn-full" style={{ background: 'var(--bg)', border: '1.5px solid var(--border)', fontFamily: 'Nunito', fontSize: 14, fontWeight: 800, cursor: 'pointer', padding: 13, borderRadius: 12, color: 'var(--muted)' }} onClick={() => setStep(1)}>
                  ← Retour
                </button>
                <button className="btn-full btn-rouge" onClick={nextStep}>Suivant →</button>
              </div>
            </>
          )}

          {/* ── ÉTAPE 3 : Récap + envoi ── */}
          {step === 3 && (
            <>
              <div style={{ background: 'var(--bg)', borderRadius: 14, padding: 16, marginBottom: 16, border: '1.5px solid var(--border)' }}>
                {form.photo_url && (
                  <img src={form.photo_url} alt="Aperçu produit"
                    style={{ width: '100%', maxHeight: 160, objectFit: 'contain', borderRadius: 10, marginBottom: 12, background: 'white' }}
                    onError={e => e.target.style.display='none'}
                  />
                )}
                <div style={{ fontWeight: 900, fontSize: 15, marginBottom: 10 }}>{form.titre}</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {[
                    ['🏪 Magasin',    form.magasin],
                    ['📦 Catégorie',  form.categorie + ' ' + (CAT_ICONS[form.categorie] || '')],
                    ['💰 Prix promo', form.prix_promo + ' MAD' + (discount() ? ` (-${discount()}%)` : '')],
                    ['📍 Ville',      form.ville],
                    ['🌐 Type',       form.type],
                  ].map(([k, v]) => v ? (
                    <div key={k} style={{ display: 'flex', gap: 8, fontSize: 12 }}>
                      <span style={{ color: 'var(--muted)', fontWeight: 700, minWidth: 100 }}>{k}</span>
                      <span style={{ fontWeight: 800, color: 'var(--text)' }}>{v}</span>
                    </div>
                  ) : null)}
                </div>
              </div>

              <div style={{ fontSize: 12, color: 'var(--muted)', fontWeight: 600, marginBottom: 16, textAlign: 'center' }}>
                ⚡ Ton deal sera examiné par notre équipe avant publication.
              </div>

              <div className="field-row">
                <button className="btn-full" style={{ background: 'var(--bg)', border: '1.5px solid var(--border)', fontFamily: 'Nunito', fontSize: 14, fontWeight: 800, cursor: 'pointer', padding: 13, borderRadius: 12, color: 'var(--muted)' }} onClick={() => setStep(2)}>
                  ← Modifier
                </button>
                <button className="btn-full btn-gradient" onClick={submit} disabled={loading}>
                  {loading ? '⏳ Envoi...' : '🔥 Envoyer le deal'}
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

const TAGLINE_AR = 'فيد و ستافيد — شارك هميزات ديالك و خلي غيرك يستافد 🔥';

function HeroBand() {
  const [displayed, setDisplayed] = useState('');
  const [done, setDone]           = useState(false);
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const [popupOpen, setPopupOpen] = useState(() =>
    isMobile && !sessionStorage.getItem('hero_dismissed')
  );

  useEffect(() => {
    let i = 0;
    const timeout = setTimeout(() => {
      const interval = setInterval(() => {
        i++;
        setDisplayed(TAGLINE_AR.slice(0, i));
        if (i >= TAGLINE_AR.length) {
          clearInterval(interval);
          setTimeout(() => setDone(true), 600);
        }
      }, 35);
      return () => clearInterval(interval);
    }, 400);
    return () => clearTimeout(timeout);
  }, []);

  const closePopup = () => {
    sessionStorage.setItem('hero_dismissed', '1');
    setPopupOpen(false);
  };

  const heroContent = (
    <>
      <div className="hero-top">
        <div className="hero-tagline-fr hero-fr-anim">
          Les meilleurs bons plans du Maroc,<br/>
          <span>partagés par la communauté</span>
        </div>
        <div className="hero-tagline-ar hero-ar-anim">
          {displayed}
          {!done && <span className="hero-cursor" />}
        </div>
      </div>
      <div className="hero-steps hero-steps-anim">
        <div className="hero-step">
          <div className="hero-step-head">
            <div className="hero-step-num">1</div>
            <span className="hero-step-emoji">🔍</span>
            <div>
              <div className="hero-step-title">Tu déniche une هميزة</div>
              <span className="hero-step-title-ar">لقيتي لهميزة ديالك؟</span>
            </div>
          </div>
          <div className="hero-step-desc">En faisant tes courses en magasin ou en ligne — si ça t'a fait économiser, ça peut faire économiser tout le monde.</div>
        </div>
        <div className="hero-step">
          <div className="hero-step-head">
            <div className="hero-step-num">2</div>
            <span className="hero-step-emoji">📤</span>
            <div>
              <div className="hero-step-title">Tu la partages en 30 sec</div>
              <span className="hero-step-title-ar">شاركها مع الجماعة</span>
            </div>
          </div>
          <div className="hero-step-desc">Prix, magasin, ville — c'est tout ce qu'il faut. Notre équipe vérifie et publie. Ton deal aide des centaines de personnes à faire les mêmes économies.</div>
        </div>
        <div className="hero-step">
          <div className="hero-step-head">
            <div className="hero-step-num">3</div>
            <span className="hero-step-emoji">🔥</span>
            <div>
              <div className="hero-step-title">La communauté vote</div>
              <span className="hero-step-title-ar">الجماعة تقيّم</span>
            </div>
          </div>
          <div className="hero-step-desc"><strong>ربح</strong> = deal intéressant, fonce. <strong>خسارة</strong> = à éviter. Les meilleures أميزات remontent en tête — plus tu partages, plus tu construis ta réputation.</div>
        </div>
      </div>
    </>
  );

  // ── Desktop : hero inline comme avant ──
  if (!isMobile) return <div className="hero-band">{heroContent}</div>;

  // ── Mobile : petite bannière + popup bottom sheet ──
  return (
    <>
      <div onClick={() => setPopupOpen(true)}
        style={{ background: 'var(--white)', border: '1.5px solid var(--border)', borderRadius: 12, padding: '11px 16px', marginBottom: 12, display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 20 }}>💡</span>
          <div>
            <div style={{ fontSize: 13, fontWeight: 800, color: 'var(--text)' }}>Comment ça marche ?</div>
            <div style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 600, fontFamily: 'Scheherazade New, serif', fontSize: 13 }}>فيد و ستافيد</div>
          </div>
        </div>
        <span style={{ fontSize: 18, color: 'var(--muted)', fontWeight: 700 }}>›</span>

      {popupOpen && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', zIndex: 400, display: 'flex', alignItems: 'flex-end' }}

          <div style={{ background: 'var(--white)', borderRadius: '20px 20px 0 0', width: '100%', maxHeight: '88vh', overflowY: 'auto', WebkitOverflowScrolling: 'touch', overscrollBehavior: 'contain' }}
            onClick={e => e.stopPropagation()}>
            <div style={{ padding: '14px 20px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ width: 40, height: 4, background: 'var(--border)', borderRadius: 4 }}/>

            </div>
            <div style={{ padding: '8px 16px 32px' }}>
              {heroContent}

    </>
  );

//  DEAL CARD
// ══════════════════════════════════════════
function DealCard({ deal, user, onVote, onClick, votingId }) {
  const pct = deal.prix_normal > 0 ? Math.round((1 - deal.prix_promo / deal.prix_normal) * 100) : null;
  const isHot = deal.score >= 20;
  const dateStr = deal.created_at ? (() => {
    const diff = Math.floor((Date.now() - new Date(deal.created_at)) / 60000);
    if (diff < 60) return `il y a ${diff}min`;
    if (diff < 1440) return `il y a ${Math.floor(diff/60)}h`;
    return `il y a ${Math.floor(diff/1440)}j`;
  })() : '';

  return (
    <div className="deal-card" onClick={() => onClick(deal)}>
      {/* Image à gauche */}
      <div className="dc-img">
        {deal.photo_url
          ? <img src={deal.photo_url} alt={deal.titre} onError={e => { e.target.style.display='none'; e.target.nextSibling && (e.target.nextSibling.style.display='flex'); }} />
          : null
        }
        <span className="dc-img-placeholder" style={{ display: deal.photo_url ? 'none' : 'flex', alignItems: 'center', justifyContent: 'center', width: '100%', height: '100%' }}>
          {CAT_ICONS[deal.categorie] || '🛍️'}
        </span>
      </div>

      {/* Contenu */}
      <div className="dc-body">
        <div className="dc-top">
          <div className="dc-score" onClick={e => e.stopPropagation()}>
            <button className="dc-vote-btn rabah"
              disabled={votingId === deal.id}
              onClick={e => { e.stopPropagation(); onVote(deal.id, 'chaud'); }}>ربح ▲</button>
            <span className={`dc-score-num ${deal.score < 0 ? 'cold' : ''}`}>{deal.score}°</span>
            <button className="dc-vote-btn khssara"
              disabled={votingId === deal.id}
              onClick={e => { e.stopPropagation(); onVote(deal.id, 'froid'); }}>▼ خسارة</button>
          </div>
          <span className="dc-date">{dateStr}</span>
        </div>

        <div className="dc-title">{deal.titre}</div>

        <div className="dc-price-row">
          <span className="dc-price-promo">{deal.prix_promo} MAD</span>
          {deal.prix_normal > 0 && <span className="dc-price-normal">{deal.prix_normal} MAD</span>}
          {pct > 0 && <span className="dc-price-pct">-{pct}%</span>}
        </div>

        <div className="dc-meta">

  );

function DealDetail({ deal, user, userProfile, onBack, onVote, votingId }) {
  const pct = deal.prix_normal > 0 ? Math.round((1 - deal.prix_promo / deal.prix_normal) * 100) : null;
  const [comments, setComments] = useState([]);
  const [newComment, setNewComment] = useState('');
  const [loadingComment, setLoadingComment] = useState(false);

  useEffect(() => {
    sb.from('commentaires')
      .select('id, contenu, created_at, user_id')
      .eq('deal_id', deal.id)
      .order('created_at', { ascending: true })
      .then(async ({ data }) => {
        if (!data || data.length === 0) return;
        const userIds = [...new Set(data.map(c => c.user_id).filter(Boolean))];
        const { data: usersData } = await sb.from('users').select('id, pseudo').in('id', userIds);
        const userMap = {};
        (usersData || []).forEach(u => { userMap[u.id] = u.pseudo; });
        setComments(data.map(c => ({ ...c, users: { pseudo: userMap[c.user_id] || 'Anonyme' } })));
      });
  }, [deal.id]);

  async function addComment() {
    if (!newComment.trim() || !user) return;
    setLoadingComment(true);
    const contenu = newComment.trim();
    setNewComment('');

    const tempComment = {
      id: 'temp-' + Date.now(),
      deal_id: deal.id,
      user_id: user.id,
      contenu,
      created_at: new Date().toISOString(),
      users: { pseudo: userProfile?.pseudo || user.email.split('@')[0] }
    };
    setComments(prev => [...prev, tempComment]);

    const { data: inserted, error } = await sb
      .from('commentaires')
      .insert({ deal_id: deal.id, user_id: user.id, contenu })
      .select('id, contenu, created_at, user_id');

    if (error) {
      setComments(prev => prev.filter(c => c.id !== tempComment.id));
      setNewComment(contenu);
      toast('❌ Erreur : ' + error.message, 'err');
      setLoadingComment(false);
      return;
    }

    // Fetch sans jointure — on enrichit avec les pseudos depuis la table users séparément
    const { data: freshComments } = await sb
      .from('commentaires')
      .select('id, contenu, created_at, user_id')
      .eq('deal_id', deal.id)
      .order('created_at', { ascending: true });

    if (freshComments && freshComments.length > 0) {
      // Récupère les pseudos depuis la table users
      const userIds = [...new Set(freshComments.map(c => c.user_id).filter(Boolean))];
      const { data: usersData } = await sb
        .from('users')
        .select('id, pseudo')
        .in('id', userIds);

      const userMap = {};
      (usersData || []).forEach(u => { userMap[u.id] = u.pseudo; });

      const enriched = freshComments.map(c => ({
        ...c,
        users: { pseudo: userMap[c.user_id] || 'Anonyme' }
      }));
      setComments(enriched);
    }
    setLoadingComment(false);
  }

  return (
    <div>
      <div className="deal-detail">

        {/* Topbar : retour + date */}
        <div className="deal-detail-topbar">
          <button className="back-btn" onClick={() => { location.hash = 'feed'; onBack(); }}>← Retour au feed</button>
          <span className="deal-detail-date">
            {deal.created_at ? (() => {
              const diff = Math.floor((Date.now() - new Date(deal.created_at)) / 60000);
              if (diff < 60) return `Publié il y a ${diff} min`;
              if (diff < 1440) return `Publié il y a ${Math.floor(diff/60)}h`;
              return `Publié il y a ${Math.floor(diff/1440)}j`;
            })() : ''}
          </span>
        </div>

        {/* Layout principal : image gauche / contenu droite */}
        <div className="deal-detail-layout">

          {/* Image */}
          <div className="deal-detail-img">
            {deal.photo_url
              ? <img src={deal.photo_url} alt={deal.titre} onError={e => e.target.style.display='none'} />
              : <span className="deal-detail-img-placeholder">{CAT_ICONS[deal.categorie] || '🛍️'}</span>
            }
          </div>

          {/* Contenu */}
          <div className="deal-detail-content">
            {/* Tags */}
            <div style={{ display: 'flex', gap: 6 }}>
              <span className="deal-tag tag-cat">{CAT_ICONS[deal.categorie] || '✨'} {deal.categorie}</span>
              <span className="deal-tag tag-type">{deal.type === 'physique' ? '🏪 Physique' : '🌐 En ligne'}</span>
            </div>

            {/* Titre */}
            <div className="deal-detail-titre">{deal.titre}</div>
            {deal.poster_pseudo && (
              <div style={{ fontSize: 12, color: 'var(--muted)', fontWeight: 600 }}>
                Partagé par <strong style={{ color: 'var(--text)' }}>{deal.poster_pseudo}</strong>
              </div>
            )}

            {/* Prix */}
            <div className="deal-detail-prix">
              <span className="deal-detail-promo">{deal.prix_promo} MAD</span>
              {deal.prix_normal > 0 && <span className="deal-detail-normal">{deal.prix_normal} MAD</span>}

            {/* Meta */}

              <span>Dispo. chez <strong>{deal.magasin}</strong></span>

                <p style={{ fontSize: 14, color: 'var(--text)', fontWeight: 600, lineHeight: 1.75, margin: 0 }}>{deal.description}</p>

              <a href={deal.lien} target="_blank" rel="noopener noreferrer" className="deal-detail-voir">

            {/* Bouton WhatsApp contact */}
            {deal.whatsapp_contact && (
              <a href={`https://wa.me/212${deal.whatsapp_contact.replace(/^0/, '')}`}
                target="_blank" rel="noopener noreferrer"
                style={{ display: 'inline-flex', alignItems: 'center', gap: 10, padding: '13px 22px', background: '#25D366', color: 'white', borderRadius: 12, fontFamily: 'Nunito', fontSize: 14, fontWeight: 800, textDecoration: 'none', transition: 'opacity 0.15s', alignSelf: 'flex-start' }}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Contacter sur WhatsApp
              </a>
            )}
          </div>
        </div>

        {/* Bandeau votes */}
        <div className="deal-detail-votes">
          <span className="deal-detail-votes-label">Vos votes mettent en avant les meilleures أميزات — c'est un bon deal ?</span>
          <button className="vote-btn fire" onClick={() => onVote(deal.id, 'chaud')}

        {/* Commentaires */}
        <div className="deal-detail-comments">

          {user ? (
            <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
              <input value={newComment} onChange={e => setNewComment(e.target.value)}

// ── Compression + upload photo (partagé entre SubmitDeal et Admin) ──
async function compressAndUpload(file, onUrl, onError) {
  try {
    const compressed = await new Promise((resolve) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = e => {
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 800;
          let w = img.width, h = img.height;
          if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
          if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.78);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
    const filename = `deal-${Date.now()}.jpg`;
    const { error } = await sb.storage.from('deals-photos').upload(filename, compressed, { contentType: 'image/jpeg', upsert: false });
    if (error) throw error;
    const { data: urlData } = sb.storage.from('deals-photos').getPublicUrl(filename);
    onUrl(urlData.publicUrl);
  } catch (err) {
    onError(err.message);
  }
}

                                style={{ fontSize: 11, fontWeight: 800, color: 'var(--rouge)', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'Nunito' }}>✕ Supprimer</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ border: '1.5px dashed var(--border)', borderRadius: 10, padding: 14, background: 'var(--bg)' }}>
                            {uploadingAdmin ? (
                              <div style={{ textAlign: 'center', fontSize: 12, fontWeight: 700, color: 'var(--muted)' }}>⏳ Compression et upload...</div>
                            ) : (
                              <>
                                <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, cursor: 'pointer', fontSize: 12, fontWeight: 800, color: 'var(--blue)' }}>
                                  <input type="file" accept="image/*" style={{ display: 'none' }} onChange={e => {
                                    if (!e.target.files[0]) return;
                                    setUploadingAdmin(true);
                                    compressAndUpload(e.target.files[0],
                                      url => { setEditForm(p => ({ ...p, photo_url: url })); setUploadingAdmin(false); },
                                      err => { toast('❌ ' + err, 'err'); setUploadingAdmin(false); }
                                    );
                                  }} />
                                  📷 Choisir une photo
                                </label>
                                <div style={{ margin: '8px 0', display: 'flex', alignItems: 'center', gap: 6 }}>
                                  <div style={{ flex: 1, height: 1, background: 'var(--border)' }}/>
                                  <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700 }}>ou URL</span>
                                  <div style={{ flex: 1, height: 1, background: 'var(--border)' }}/>
                                </div>
                                <input value={editForm.photo_url || ''} onChange={e => setEditForm(p => ({ ...p, photo_url: e.target.value }))}
                                  placeholder="https://...image.jpg"
                                  style={{ width: '100%', padding: '6px 10px', border: '1.5px solid var(--border)', borderRadius: 8, fontSize: 12, fontFamily: 'Nunito', fontWeight: 600, color: 'var(--text)', background: 'white', boxSizing: 'border-box' }} />
                              </>
                            )}
                          </div>
                        )}
                        {/* WhatsApp contact */}
                        <div style={{ background: '#e8faf0', border: '1.5px solid #25D366', borderRadius: 8, padding: '10px 12px', display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{ fontSize: 16, flexShrink: 0 }}>💬</span>
                          <span style={{ fontSize: 11, fontWeight: 800, color: '#0a6e3a', flexShrink: 0 }}>+212</span>
                          <input value={editForm.whatsapp_contact || ''} onChange={e => setEditForm(p => ({ ...p, whatsapp_contact: e.target.value.replace(/[^0-9]/g, '') }))}
                            placeholder="6XXXXXXXX — Contact WhatsApp (optionnel)" maxLength={9}
                            style={{ flex: 1, padding: '6px 10px', border: '1.5px solid #25D366', borderRadius: 8, fontSize: 13, fontFamily: 'Nunito', fontWeight: 700, background: 'white', color: 'var(--text)' }} />
                        </div>
                        <div style={{ display: 'flex', gap: 8 }}>
                          <button onClick={() => saveEdit(d.id)} style={{ background: 'var(--green)', color: 'white', border: 'none', padding: '9px 20px', borderRadius: 8, fontWeight: 900, fontSize: 13, cursor: 'pointer', fontFamily: 'Nunito' }}>💾 Sauvegarder</button>
                          <button onClick={() => setEditId(null)} style={{ background: 'var(--bg)', color: 'var(--muted)', border: '1px solid var(--border)', padding: '9px 16px', borderRadius: 8, fontWeight: 700, fontSize: 13, cursor: 'pointer', fontFamily: 'Nunito' }}>Annuler</button>
                        </div>
                      </div>
                    ) : (
                      /* ── MODE AFFICHAGE ── */
                      <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                        {d.photo_url && <img src={d.photo_url} alt="" style={{ width: 60, height: 60, objectFit: 'contain', borderRadius: 8, background: 'var(--bg)', flexShrink: 0 }} onError={e => e.target.style.display='none'} />}
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 900, fontSize: 15, marginBottom: 4, textDecoration: d.statut === 'expiré' ? 'line-through' : 'none' }}>{d.titre}</div>
                          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', marginBottom: 6, alignItems: 'center' }}>
                            <span style={{ fontSize: 16, fontWeight: 900, color: 'var(--rouge)' }}>{d.prix_promo} MAD</span>
                            {pct > 0 && <span style={{ fontSize: 10, background: '#e8faf5', color: '#0a8c63', padding: '2px 7px', borderRadius: 20, fontWeight: 800 }}>-{pct}%</span>}
                            {d.prix_normal > 0 && <span style={{ fontSize: 12, color: 'var(--muted)', textDecoration: 'line-through', fontWeight: 700 }}>{d.prix_normal} MAD</span>}
                          </div>
                          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', marginBottom: 4 }}>
                            {[['🏪', d.magasin], ['📦', d.categorie], ['📍', d.ville], d.date_fin && ['⏰', new Date(d.date_fin).toLocaleDateString('fr-FR')]].filter(Boolean).map(([icon, val]) => (
                              <span key={val} style={{ fontSize: 11, fontWeight: 700, color: 'var(--muted)' }}>{icon} {val}</span>
                            ))}
                          </div>
                          {d.lien && <a href={d.lien} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: 'var(--blue)', fontWeight: 700 }}>🔗 Voir le lien</a>}
                          <div style={{ fontSize: 10, color: '#ccc', fontWeight: 700, marginTop: 4 }}>
                            Soumis le {new Date(d.created_at).toLocaleDateString('fr-FR')} à {new Date(d.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}
                          </div>
                        </div>
                        {/* Actions */}
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 5, flexShrink: 0 }}>
                          {onglet === 'en_attente' && <>
                            {btnAction('✅ Valider',  () => updateStatut(d.id, 'validé'),  'white', 'var(--green)', 'none')}
                            {btnAction('✕ Refuser',  () => updateStatut(d.id, 'refusé'),  'var(--rouge)', 'white', '1.5px solid var(--rouge)')}
                          </>}
                          {onglet === 'validé' && <>
                            {btnAction('⏸ Expirer',  () => updateStatut(d.id, 'expiré'),  '#cc8800', '#fff8e0', '1px solid #ffe066')}
                            {btnAction('✕ Retirer',  () => updateStatut(d.id, 'refusé'),  'var(--rouge)', 'white', '1.5px solid var(--rouge)')}
                          </>}
                          {onglet === 'refusé' && <>
                            {btnAction('✅ Republier', () => updateStatut(d.id, 'validé'), 'white', 'var(--green)', 'none')}
                            {btnAction('↩️ Attente',   () => updateStatut(d.id, 'en_attente'), 'var(--muted)', 'none', '1px solid var(--border)')}
                          </>}
                          {onglet === 'expiré' && <>
                            {btnAction('✅ Republier', () => updateStatut(d.id, 'validé'), 'white', 'var(--green)', 'none')}
                          </>}
                          {btnAction('✏️ Modifier', () => startEdit(d), 'var(--blue)', '#e8f4ff', '1px solid #b8daff')}
                          {btnAction('🗑 Supprimer', () => supprimer(d.id), 'var(--muted)', 'none', '1px solid var(--border)')}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          }
        </div>
      </div>
    </div>
  );
}

//  PAGE MES DEALS
// ══════════════════════════════════════════
function MesDealsPage({ user, userProfile, onGoFeed }) {
  const [deals, setDeals]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    sb.from('deals').select('*').eq('user_id', user.id)
      .order('created_at', { ascending: false })
      .then(({ data }) => { setDeals(data || []); setLoading(false); });
  }, []);

  const startEdit = (d) => {
    setEditId(d.id);
    setEditForm({ titre: d.titre, magasin: d.magasin, prix_promo: d.prix_promo, prix_normal: d.prix_normal || '', ville: d.ville, description: d.description || '', lien: d.lien || '', date_fin: d.date_fin || '', photo_url: d.photo_url || '', whatsapp_contact: d.whatsapp_contact || '' });
  };

  const saveEdit = async (id) => {
    setSaving(true);
    // Repasse en_attente pour approbation admin
    const { error } = await sb.from('deals').update({
      ...editForm,
      prix_promo:  parseFloat(editForm.prix_promo),
      prix_normal: parseFloat(editForm.prix_normal) || 0,
      statut: 'en_attente'
    }).eq('id', id);
    setSaving(false);
    if (!error) {
      setDeals(p => p.map(d => d.id === id ? { ...d, ...editForm, statut: 'en_attente' } : d));
      setEditId(null);
      toast('✅ Modifications envoyées — en attente de validation.', 'ok');
    } else {
      toast('❌ Erreur : ' + error.message, 'err');
    }
  };

  const statutLabel = { en_attente: '⏳ En attente', validé: '✅ Validé', refusé: '❌ Refusé', expiré: '⏸ Expiré' };
  const statutBg    = { en_attente: '#fff8e0', validé: '#e8faf5', refusé: '#fff0f0', expiré: '#f0eee8' };
  const statutColor = { en_attente: '#cc8800', validé: '#0a8c63', refusé: 'var(--rouge)', expiré: 'var(--muted)' };

  const inp = (key, label, type = 'text') => (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
      <label style={{ fontSize: 10, fontWeight: 800, textTransform: 'uppercase', letterSpacing: 1, color: 'var(--muted)' }}>{label}</label>
      <input type={type} value={editForm[key] || ''} onChange={e => setEditForm(p => ({ ...p, [key]: e.target.value }))}
        style={{ padding: '8px 10px', border: '1.5px solid var(--border)', borderRadius: 8, fontSize: 13, fontFamily: 'Nunito', fontWeight: 600, color: 'var(--text)', background: 'var(--white)' }} />
    </div>
  );

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)' }}>
      <div style={{ background: 'var(--dark)', padding: '0 28px', height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 100 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ background: 'var(--rouge)', borderRadius: 10, padding: '4px 12px', cursor: 'pointer' }} onClick={onGoFeed}>
            <span style={{ fontFamily: 'Scheherazade New, serif', fontSize: 16, color: 'white', fontWeight: 700 }}>فيدوستافيد</span>
          </div>
          <span style={{ color: 'rgba(255,255,255,0.4)', fontSize: 13 }}>|</span>
          <span style={{ color: 'rgba(255,255,255,0.7)', fontSize: 13, fontWeight: 800 }}>📋 Mes deals soumis</span>
        </div>
        <button onClick={onGoFeed} style={{ background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.15)', color: 'rgba(255,255,255,0.6)', padding: '6px 14px', borderRadius: 8, fontSize: 12, fontWeight: 800, cursor: 'pointer', fontFamily: 'Nunito' }}>← Retour</button>
      </div>

      <div style={{ maxWidth: 720, margin: '0 auto', padding: '28px 20px 60px' }}>
        <div style={{ background: 'var(--white)', border: '1.5px solid var(--border)', borderRadius: 16, overflow: 'hidden' }}>
          <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center' }}>
            <span style={{ fontSize: 15, fontWeight: 900 }}>📋 Mes deals soumis</span>
            <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--muted)', fontWeight: 700 }}>{deals.length} deal{deals.length > 1 ? 's' : ''}</span>
          </div>

          {loading ? <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)', fontWeight: 700 }}>Chargement...</div>
          : deals.length === 0 ? (
            <div style={{ padding: 48, textAlign: 'center', color: 'var(--muted)' }}>
              <div style={{ fontSize: 40, marginBottom: 10 }}>📭</div>
              <div style={{ fontSize: 14, fontWeight: 700 }}>Aucun deal soumis pour l'instant.</div>
            </div>
          ) : deals.map((d, i) => {
            const pct = d.prix_normal > 0 ? Math.round((1 - d.prix_promo / d.prix_normal) * 100) : null;
            const isEditing = editId === d.id;
            return (
              <div key={d.id} style={{ padding: '16px 20px', borderBottom: i < deals.length - 1 ? '1px solid var(--border)' : 'none' }}>
                {isEditing ? (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                    <div style={{ background: '#fff8e0', border: '1px solid #ffe066', borderRadius: 8, padding: '10px 14px', fontSize: 12, fontWeight: 700, color: '#7a5c00' }}>
                      ⚠️ Après modification, ton deal repassera en validation avant d'être republié.
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                      {inp('titre', 'Titre')}
                      {inp('magasin', 'Magasin')}
                      {inp('prix_promo', 'Prix promo (MAD)', 'number')}
                      {inp('prix_normal', 'Prix normal (MAD)', 'number')}
                      {inp('ville', 'Ville')}
                      {inp('date_fin', 'Date fin', 'date')}
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <label style={{ fontSize: 10, fontWeight: 800, textTransform: 'uppercase', letterSpacing: 1, color: 'var(--muted)' }}>Description</label>
                      <textarea value={editForm.description || ''} onChange={e => setEditForm(p => ({ ...p, description: e.target.value }))} rows={3}
                        style={{ padding: '8px 10px', border: '1.5px solid var(--border)', borderRadius: 8, fontSize: 13, fontFamily: 'Nunito', fontWeight: 600, color: 'var(--text)', resize: 'vertical' }} />
                    </div>
                    {inp('lien', '🔗 Lien vers le deal (URL)')}
                    {inp('photo_url', '🖼️ URL de la photo produit')}
                    <div style={{ background: '#e8faf0', border: '1.5px solid #25D366', borderRadius: 10, padding: '10px 14px', display: 'flex', flexDirection: 'column', gap: 6 }}>
                      <label style={{ fontSize: 10, fontWeight: 800, textTransform: 'uppercase', letterSpacing: 1, color: '#0a6e3a' }}>💬 Contact WhatsApp (optionnel)</label>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <span style={{ fontSize: 13, fontWeight: 800, color: '#0a6e3a', flexShrink: 0 }}>+212</span>
                        <input type="tel" value={editForm.whatsapp_contact || ''} onChange={e => setEditForm(p => ({ ...p, whatsapp_contact: e.target.value.replace(/[^0-9]/g, '') }))}
                          placeholder="6XXXXXXXX" maxLength={9}
                          style={{ flex: 1, padding: '8px 10px', border: '1.5px solid #25D366', borderRadius: 8, fontSize: 14, fontFamily: 'Nunito', fontWeight: 700, background: 'white', color: 'var(--text)' }} />
                      </div>
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button onClick={() => saveEdit(d.id)} disabled={saving}
                        style={{ background: 'var(--rouge)', color: 'white', border: 'none', padding: '10px 20px', borderRadius: 10, fontWeight: 900, fontSize: 13, cursor: 'pointer', fontFamily: 'Nunito', flex: 1 }}>
                        {saving ? '⏳ Envoi...' : '📤 Envoyer pour validation'}
                      </button>
                      <button onClick={() => setEditId(null)}
                        style={{ background: 'var(--bg)', color: 'var(--muted)', border: '1px solid var(--border)', padding: '10px 16px', borderRadius: 10, fontWeight: 700, fontSize: 13, cursor: 'pointer', fontFamily: 'Nunito' }}>
                        Annuler
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    {d.photo_url && <img src={d.photo_url} alt="" style={{ width: 48, height: 48, objectFit: 'contain', borderRadius: 8, background: 'var(--bg)', flexShrink: 0 }} onError={e => e.target.style.display='none'} />}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 800, color: 'var(--text)', marginBottom: 3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{d.titre}</div>
                      <div style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 700 }}>
                        <span style={{ color: 'var(--rouge)', fontWeight: 900 }}>{d.prix_promo} MAD</span>
                        {pct > 0 && <span> · -{pct}%</span>}
                        <span> · {d.magasin} · {new Date(d.created_at).toLocaleDateString('fr-FR')}</span>
                      </div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                      <span style={{ fontSize: 11, fontWeight: 800, padding: '4px 10px', borderRadius: 20, background: statutBg[d.statut], color: statutColor[d.statut] }}>
                        {statutLabel[d.statut] || d.statut}
                      </span>
                      <span style={{ fontSize: 13, fontWeight: 900, color: 'var(--rouge)' }}>🔥 {d.score}</span>
                      {(d.statut === 'validé' || d.statut === 'refusé' || d.statut === 'en_attente') && (
                        <button onClick={() => startEdit(d)}
                          style={{ background: '#e8f4ff', color: 'var(--blue)', border: '1px solid #b8daff', padding: '5px 12px', borderRadius: 8, fontWeight: 800, fontSize: 12, cursor: 'pointer', fontFamily: 'Nunito', whiteSpace: 'nowrap' }}>
                          ✏️ Modifier
                        </button>
                      )}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}
